<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Platform Poster</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        /* CSS ทั้งหมดของคุณยังคงอยู่ที่นี่ (ไม่มีการเปลี่ยนแปลง) */
        :root {
            --primary-color: #4A69BD; --primary-hover: #3C56A0;
            --success-color: #2ECC71; --success-hover: #27AE60;
            --danger-color: #E74C3C; --danger-hover: #C0392B;
            --warning-color: #f39c12; --warning-hover: #e67e22;
            --background-color: #f4f7f9; --container-bg: #ffffff;
            --text-primary: #34495E; --text-secondary: #7f8c8d;
            --border-color: #dfe4e8; --shadow-color: rgba(0, 0, 0, 0.08);
        }
        body { font-family: 'Poppins', 'Kantumruy Pro', sans-serif; background-color: var(--background-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; color: var(--text-primary); }
        .container { background-color: var(--container-bg); padding: 40px; border-radius: 12px; box-shadow: 0 5px 15px var(--shadow-color); border: 1px solid var(--border-color); max-width: 650px; width: 100%; box-sizing: border-box; margin: 20px 0; }
        h1 { text-align: center; color: var(--text-primary); margin-top: 0; margin-bottom: 30px; font-size: 28px; font-weight: 600; }
        .label-title { font-weight: 500; color: var(--text-primary); display: block; margin-bottom: 8px; font-size: 14px; }
        textarea, input[type="text"], input[type="url"], input[type="datetime-local"], select { width: 100%; padding: 12px 15px; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 16px; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: border-color 0.3s, box-shadow 0.3s; }
        textarea:focus, input:focus, select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(74, 105, 189, 0.2); }
        textarea { resize: vertical; min-height: 120px; margin-bottom: 5px; }
        #caption-history { background-color: #f8f9fa; color: var(--text-secondary); font-size: 14px; }
        .file-upload-label { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background-color: #ecf0f1; color: var(--text-primary); border: 2px dashed var(--border-color); padding: 30px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 500; transition: background-color 0.3s, border-color 0.3s; }
        .file-upload-label i { font-size: 24px; color: var(--text-secondary); }
        .file-upload-label:hover { background-color: #e3e8ea; border-color: var(--primary-color); }
        #preview-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .preview-item { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); height: 100px; cursor: grab; }
        .preview-item:active { cursor: grabbing; }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .preview-item .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; gap: 10px; opacity: 0; transition: opacity 0.3s; }
        .preview-item:hover .overlay { opacity: 1; }
        .overlay-btn { background: none; border: none; color: white; cursor: pointer; font-size: 18px; padding: 5px; border-radius: 50%; background-color: rgba(0,0,0,0.4); line-height: 1; }
        .overlay-btn:hover { color: var(--danger-color); } .replace-label { cursor: pointer; } .replace-label .overlay-btn:hover { color: var(--success-color); } .replace-label input { display: none; }
        .preview-item.sortable-ghost { opacity: 0.4; border: 2px dashed var(--primary-color); }
        .platform-group { margin-bottom: 25px; display: flex; gap: 25px; flex-wrap: wrap; } .checkbox-label { display: flex; align-items: center; cursor: pointer; font-weight: 400; font-size: 16px; } .checkbox-label input[type="checkbox"] { display: none; } .checkbox-label i.fab { font-size: 20px; margin-right: 8px; width: 20px; text-align: center; } .fa-facebook { color: #1877F2; } .fa-telegram { color: #2AABEE; } .fa-instagram { color: #E4405F; } .checkbox-custom { width: 20px; height: 20px; border: 2px solid var(--border-color); border-radius: 5px; margin-right: 10px; display: inline-block; position: relative; transition: background-color 0.3s, border-color 0.3s; } .checkbox-label input[type="checkbox"]:checked + .checkbox-custom { background-color: var(--primary-color); border-color: var(--primary-color); } .checkbox-custom::after { content: ''; position: absolute; display: none; left: 6px; top: 2px; width: 5px; height: 10px; border: solid white; border-width: 0 3px 3px 0; transform: rotate(45deg); } .checkbox-label input[type="checkbox"]:checked + .checkbox-custom::after { display: block; }
        .button-group { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; } .button-group input { flex: 1; margin-bottom: 0; }
        button, button[type="submit"] { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background-color: var(--primary-color); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; font-family: 'Poppins', sans-serif; transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s; }
        button:hover, button[type="submit"]:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); }
        button.remove-btn { background-color: var(--danger-color); } button.remove-btn:hover { background-color: var(--danger-hover); } .add-button { background-color: var(--success-color); margin-bottom: 25px; } .add-button:hover { background-color: var(--success-hover); }
        button[type="submit"] { width: 100%; margin-top: 10px; }
        button[type="submit"].schedule-btn { background-color: var(--warning-color); } button[type="submit"].schedule-btn:hover { background-color: var(--warning-hover); }
        .schedule-group { background-color: #f8f9fa; border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; } .schedule-toggle-label { display: flex; align-items: center; cursor: pointer; font-weight: 500; } #schedule-toggle { margin-right: 10px; width: 18px; height: 18px; } #schedule-time-container { margin-top: 15px; display: none; }
        #buttons-container { margin-bottom: 10px; }
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; } .popup-overlay.active { opacity: 1; visibility: visible; } .popup-content { background-color: var(--container-bg); padding: 40px; border-radius: 12px; text-align: center; min-width: 300px; transform: scale(0.9); transition: transform 0.3s; } .popup-overlay.active .popup-content { transform: scale(1); } .popup-state { display: none; flex-direction: column; align-items: center; gap: 15px; } .popup-state.active { display: flex; } .popup-state i { font-size: 50px; } .popup-state .icon-loading { color: var(--primary-color); } .popup-state .icon-success { color: var(--success-color); } .popup-state .icon-error { color: var(--danger-color); } .popup-state h3 { margin: 0; font-size: 20px; color: var(--text-primary); } .popup-state p { margin: 0; color: var(--text-secondary); } .popup-state .popup-button { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-share-square"></i> Post to Social Platforms</h1>
        <form id="poster-form" action="post.php" method="POST" enctype="multipart/form-data">
            <label for="posted_by" class="label-title"><i class="fas fa-user"></i> Posted By:</label>
            <input type="text" id="posted_by" name="posted_by" placeholder="Enter your name" required>

            <label for="caption" class="label-title"><i class="fas fa-comment-dots"></i> Caption:</label>
            <textarea id="caption" name="caption" placeholder="Enter your caption" required></textarea>
            <div class="caption-history-group">
                <select id="caption-history"><option value="" disabled selected>-- Select from Caption History --</option></select>
            </div>

            <div class="file-upload-area">
                <label class="label-title"><i class="fas fa-photo-film"></i> Upload Media & Reorder:</label>
                <label for="media" class="file-upload-label">
                    <i class="fas fa-upload"></i>
                    <span>Click here to select images or videos</span>
                </label>
                <input type="file" id="media" name="media[]" accept="image/*,video/*" multiple style="display:none;">
                <div id="preview-container"></div>
            </div>

            <label class="label-title"><i class="fas fa-bullhorn"></i> Platforms:</label>
            <div class="platform-group">
                <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="facebook"><span class="checkbox-custom"></span> <i class="fab fa-facebook"></i> Facebook</label>
                <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="telegram"><span class="checkbox-custom"></span> <i class="fab fa-telegram"></i> Telegram</label>
                <label class="checkbox-label"><input type="checkbox" name="platforms[]" value="instagram"><span class="checkbox-custom"></span> <i class="fab fa-instagram"></i> Instagram</label>
            </div>

            <label class="label-title"><i class="fas fa-link"></i> Telegram Inline Buttons (Optional):</label>
            <div id="buttons-container"></div>
            <button type="button" class="add-button" onclick="addTelegramButtonAndSave()"><i class="fas fa-plus"></i> Add Button</button>

            <div class="schedule-group">
                <label class="schedule-toggle-label">
                    <input type="checkbox" id="schedule-toggle">
                    <span>Schedule Post for Later</span>
                </label>
                <div id="schedule-time-container">
                    <label for="schedule-time" class="label-title" style="margin-top: 10px;"><i class="fas fa-clock"></i> Select Date and Time:</label>
                    <input type="datetime-local" id="schedule-time" name="schedule_time">
                </div>
            </div>
            
            <button type="submit" id="submit-button"><i class="fas fa-paper-plane"></i> Post</button>
        </form>
    </div>

    <div id="submission-popup" class="popup-overlay">
         <div class="popup-content">
            <div id="popup-state-loading" class="popup-state"><i class="fas fa-spinner fa-spin icon-loading"></i><h3 id="loading-title">Posting...</h3><p id="loading-text">Please wait while we submit your post.</p></div>
            <div id="popup-state-success" class="popup-state"><i class="fas fa-check-circle icon-success"></i><h3 id="success-title">Post Successful!</h3><p id="success-text">Your content has been published.</p><button type="button" class="popup-button" onclick="closePopup(true)">Close</button></div>
            <div id="popup-state-error" class="popup-state"><i class="fas fa-times-circle icon-error"></i><h3>Submission Failed</h3><p>An error occurred. Please try again.</p><button type="button" class="popup-button remove-btn" onclick="closePopup(false)">Close</button></div>
        </div>
    </div>

    <script>
    const fileInput = document.getElementById('media'),
        previewContainer = document.getElementById('preview-container'),
        posterForm = document.getElementById('poster-form'),
        captionTextarea = document.getElementById('caption'),
        captionHistorySelect = document.getElementById('caption-history'),
        buttonsContainer = document.getElementById('buttons-container'),
        submissionPopup = document.getElementById('submission-popup'),
        scheduleToggle = document.getElementById('schedule-toggle'),
        scheduleTimeContainer = document.getElementById('schedule-time-container'),
        scheduleTimeInput = document.getElementById('schedule-time'),
        submitButton = document.getElementById('submit-button');
        
    let fileStore = [];

    document.addEventListener('DOMContentLoaded', () => {
        loadHistoryFromDB();
        buttonsContainer.addEventListener('input', saveButtonHistoryToDB);
    });

    async function loadHistoryFromDB() {
        try {
            // **แก้ไข:** เรียกใช้ 'api.php'
            const response = await fetch('api.php?action=get_history');
            const data = await response.json();
            loadCaptionHistory(data.captions || []);
            loadAndInitializeButtons(data.buttons || []);
        } catch (error) {
            console.error('Failed to load history from DB:', error);
            loadAndInitializeButtons([]); 
        }
    }

    // 1. ส่วนของ Caption History
    function loadCaptionHistory(history) {
        captionHistorySelect.innerHTML = '<option value="" disabled selected>-- Select from Caption History --</option>';
        history.forEach(caption => {
            const option = document.createElement('option');
            option.value = caption;
            option.textContent = caption.length > 70 ? caption.substring(0, 70) + '...' : caption;
            captionHistorySelect.appendChild(option);
        });
    }

    async function saveCaptionToDB(caption) {
        if (!caption || caption.trim() === '') return;
        const formData = new FormData();
        formData.append('api_action', 'save_caption');
        formData.append('caption', caption);
        try {
            // **แก้ไข:** ส่ง request ไปที่ 'api.php'
            await fetch('api.php', { method: 'POST', body: formData });
        } catch (error) {
            console.error('Error saving caption:', error);
        }
    }

    // 2. ส่วนของ Telegram Buttons
    function loadAndInitializeButtons(buttons) {
        buttonsContainer.innerHTML = '';
        if (buttons.length > 0) {
            buttons.forEach(button => addTelegramButton(button.text, button.url));
        } else {
            addTelegramButton('TikTok', '');
            addTelegramButton('Facebook', '');
            addTelegramButton('Instagram', '');
            saveButtonHistoryToDB(); 
        }
    }

    async function saveButtonHistoryToDB() {
        const buttonData = [];
        buttonsContainer.querySelectorAll('.button-group').forEach(group => {
            buttonData.push({
                text: group.querySelector('input[name="button_text[]"]').value,
                url: group.querySelector('input[name="button_url[]"]').value
            });
        });
        const formData = new FormData();
        formData.append('api_action', 'save_buttons');
        formData.append('buttons', JSON.stringify(buttonData));
        try {
             // **แก้ไข:** ส่ง request ไปที่ 'api.php'
            await fetch('api.php', { method: 'POST', body: formData });
        } catch (error) {
            console.error('Error saving buttons:', error);
        }
    }

    function addTelegramButton(text = '', url = '') {
        const div = document.createElement('div');
        div.className = 'button-group';
        div.innerHTML = `<input type="text" name="button_text[]" placeholder="Button Text" value="${text}"><input type="url" name="button_url[]" placeholder="Button URL" value="${url}"><button type="button" class="remove-btn" onclick="removeButtonAndSave(this)" title="Remove Button"><i class="fas fa-trash"></i></button>`;
        buttonsContainer.appendChild(div);
    }

    function addTelegramButtonAndSave() {
        addTelegramButton();
        saveButtonHistoryToDB();
    }

    function removeButtonAndSave(buttonElement) {
        buttonElement.parentElement.remove();
        saveButtonHistoryToDB();
    }


    // 3. ส่วนของ Form Logic (ไม่มีการเปลี่ยนแปลง)
    new Sortable(previewContainer, { animation: 150, ghostClass: 'sortable-ghost', onEnd: reorderFileStore });
    fileInput.addEventListener('change', handleFileSelection);
    posterForm.addEventListener('submit', handleFormSubmit);
    captionHistorySelect.addEventListener('change', (e) => { if (e.target.value) captionTextarea.value = e.target.value; });
    scheduleToggle.addEventListener('change', () => { if (scheduleToggle.checked) { scheduleTimeContainer.style.display = 'block'; scheduleTimeInput.required = true; submitButton.innerHTML = '<i class="fas fa-calendar-check"></i> Schedule Post'; submitButton.classList.add('schedule-btn'); } else { scheduleTimeContainer.style.display = 'none'; scheduleTimeInput.required = false; scheduleTimeInput.value = ''; submitButton.innerHTML = '<i class="fas fa-paper-plane"></i> Post'; submitButton.classList.remove('schedule-btn'); } });

    function openPopup() { submissionPopup.classList.add('active'); }
    function closePopup(isSuccess = false) {
        submissionPopup.classList.remove('active');
        if (isSuccess) {
            posterForm.reset();
            previewContainer.innerHTML = '';
            fileStore = [];
            loadHistoryFromDB();
            scheduleToggle.checked = false;
            scheduleTimeContainer.style.display = 'none';
            submitButton.innerHTML = '<i class="fas fa-paper-plane"></i> Post';
            submitButton.classList.remove('schedule-btn');
        }
    }
    
    function setPopupState(state) { const isScheduling = scheduleToggle.checked; const loadingTitle = document.getElementById('loading-title'), loadingText = document.getElementById('loading-text'), successTitle = document.getElementById('success-title'), successText = document.getElementById('success-text'); if (state === 'loading') { loadingTitle.textContent = isScheduling ? 'Scheduling...' : 'Posting...'; loadingText.textContent = isScheduling ? 'Your post is being saved...' : 'Please wait...'; } else if (state === 'success') { successTitle.textContent = isScheduling ? 'Post Scheduled!' : 'Post Successful!'; successText.textContent = isScheduling ? 'Your content will be published at the selected time.' : 'Your content has been published.'; }['loading', 'success', 'error'].forEach(s => { document.getElementById(`popup-state-${s}`).classList.toggle('active', s === state); }); }
    function handleFileSelection(event) { const files = Array.from(event.target.files); files.forEach(file => { if (!fileStore.some(f => f.file.name === file.name)) { const fileObject = { id: Date.now() + Math.random(), file: file }; fileStore.push(fileObject); createPreviewElement(fileObject); } }); event.target.value = null; }
    function createPreviewElement({ id, file }) { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => { const previewItem = document.createElement('div'); previewItem.className = 'preview-item'; previewItem.dataset.id = id; let mediaElement = file.type.startsWith('image/') ? document.createElement('img') : document.createElement('video'); mediaElement.src = reader.result; const overlay = document.createElement('div'); overlay.className = 'overlay'; const replaceInputId = `replace-${id}`; const replaceLabel = document.createElement('label'); replaceLabel.className = 'replace-label'; replaceLabel.innerHTML = `<span class="overlay-btn" title="Replace"><i class="fas fa-sync-alt"></i></span><input type="file" id="${replaceInputId}" accept="image/*,video/*">`; replaceLabel.querySelector('input').addEventListener('change', (e) => handleReplace(e, id)); const removeBtn = document.createElement('button'); removeBtn.className = 'overlay-btn'; removeBtn.innerHTML = '<i class="fas fa-trash-alt"></i>'; removeBtn.title = 'Remove'; removeBtn.onclick = () => handleRemove(id); overlay.appendChild(replaceLabel); overlay.appendChild(removeBtn); previewItem.appendChild(mediaElement); previewItem.appendChild(overlay); previewContainer.appendChild(previewItem); }; }
    function handleRemove(id) { const itemToRemove = previewContainer.querySelector(`.preview-item[data-id="${id}"]`); if (itemToRemove) itemToRemove.remove(); fileStore = fileStore.filter(f => f.id != id); }
    function handleReplace(event, id) { const newFile = event.target.files[0]; if (!newFile) return; const fileIndex = fileStore.findIndex(f => f.id == id); if (fileIndex > -1) { fileStore[fileIndex].file = newFile; const itemToUpdate = previewContainer.querySelector(`.preview-item[data-id="${id}"]`); const mediaElement = itemToUpdate.querySelector('img, video'); const reader = new FileReader(); reader.readAsDataURL(newFile); reader.onload = () => { mediaElement.src = reader.result; }; } }
    function reorderFileStore() { const newFileStore = []; previewContainer.querySelectorAll('.preview-item').forEach(item => { const id = item.dataset.id; const fileObject = fileStore.find(f => f.id == id); if (fileObject) newFileStore.push(fileObject); }); fileStore = newFileStore; }

    async function handleFormSubmit(event) {
        event.preventDefault();
        openPopup();
        setPopupState('loading');
        await saveButtonHistoryToDB();
        const formData = new FormData(posterForm);
        await saveCaptionToDB(formData.get('caption'));
        if (!scheduleToggle.checked) { formData.delete('schedule_time'); }
        formData.delete('media[]');
        fileStore.forEach(fileObject => { formData.append('media[]', fileObject.file); });
        try {
            // **สำคัญ:** ส่วนนี้ยังคงส่งไปที่ 'post.php' เหมือนเดิม
            const response = await fetch('post.php', { method: 'POST', body: formData });
            if (response.ok) {
                setPopupState('success');
            } else {
                throw new Error(`Server responded with status: ${response.status}`);
            }
        } catch (error) {
            setPopupState('error');
            console.error('Submission error:', error);
        }
    }
    </script>
</body>
</html>
