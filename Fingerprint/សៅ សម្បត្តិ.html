<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fingerprint Check-In/Out System</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/Tx5byKch/Logo-Van-Van-1.jpg">
    <link rel="manifest" href="manifest.json">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      /* Custom styles */
      .card-body {
        background-repeat: no-repeat;
        box-shadow: 0 4px 8px 0 rgba(82, 82, 82, 0.2), 0 6px 20px 0 rgba(99, 99, 99, 0.19);
        border-radius: 20px;
        background-size: cover;
        border: none;
        background-attachment: fixed;
        background-color: antiquewhite;
      }
      .card{
        border-radius: 20px;
      }
      .form-label{
        font-size: 18px;
        color: #007bff;
        text-decoration: underline;
        font-weight: bold;
      }
      .action-info p { font-size: 1.2rem; }
      .action-info .label { font-weight: bold; }
      .action-info .value { color: blue; }
      .map-link { word-wrap: break-word; }
      .status-message { font-size: 1.3rem; font-weight: bold; color: #dc3545; }
      .modal-dialog { max-width: 450px; }
      .btn { width: 100%; background-color: #007bff; color: white; }
      .btn:disabled { opacity: 0.6; }
      #export-section{ width: 100%; position: fixed; top: 0; bottom: 0; background-repeat: no-repeat; background-size: cover; }
      .main-header { font-family: "Arial", sans-serif; color: #343a40; bottom: 0; }
      .select-user{ font-size: 18px; font-weight: bold }
      .card-title mark { color: #212529; font-size: 12px; }
      .scan{ font-size: 18px; font-weight: bold; }
      .scan { animation: scanAnimation 1s ease-in-out infinite; }
      @keyframes scanAnimation {
        0% { transform: scale(1); background-color: #007bff; }
        50% { transform: scale(1.01); background-color: #0056b3; }
        100% { transform: scale(1); background-color: #007bff; }
      }
    </style>
</head>
<body onload="fetchLogs()">
    <section id="export-section" style="position: relative; top: -1.5rem;">
      <div class="container mt-5 main-header">
        <h1 class="text-center main-content" style="text-decoration: underline; color: rgb(0, 0, 0);">Fingerprint Check-In/Out</h1>
        <div class="card mt-4">
            <div class="card-body">
                <!-- User Name Input -->
                <div class="mb-3 mt-4">
                  <label for="userNameInput" class="form-label d-none select-user">ជ្រើសរើសអ្នកប្រើប្រាស់</label>
                  <select id="userNameInput" class="form-select" style="display:none;" required>
                    <option value="សៅ សម្បត្តិ">សៅ សម្បត្តិ(0163)</option>
                  </select>
                </div>
                <!-- Action Selection Dropdown -->
                <div class="mb-3" style="display:none;">
                  <label for="actionSelect" class="form-label">ជ្រើសរើសប្រភេទស្កេន </label>
                  <select id="actionSelect" class="form-select" required>
                    <option value="Check-In">ស្កេនចូល</option>
                    <option value="Check-Out">ស្កេនចេញ</option>
                  </select>
                </div>
                <!-- Hidden fields for ID, Department etc. -->
                <select id="idSelect" class="form-select" required style="display:none;"><option value="0163">0163</option></select>
                <select id="departmentSelect" class="form-select" required style="display:none;"><option value="IT">IT</option></select>
                <select id="PositionSelect" class="form-select" required style="display:none;"><option value="IT SUPPORT">IT SUPPORT</option></select>
                <select id="BranchSelect" class="form-select" required style="display:none;"><option value="Head Office">Head Office</option></select>

                <button id="scanFingerprint" class="btn btn-primary mb-3 scan">ចាប់ផ្តើមស្កេន</button>

                <!-- Action Information -->
                <div class="action-info">
                  <p><span class="label">ប្រភេទស្កេន៖</span> <span id="action" class="value">N/A</span></p>
                  <p><span class="label">ថ្ងៃខែឆ្នាំ/ម៉ោង៖</span> <span id="timestamp" class="value">N/A</span></p>
                  <p><span class="label">ការចាប់ទីតាំងរបស់អ្នក៖</span> <span id="location" class="value">កំពុងស្កេនទីតាំង</span></p>
                  <p><span class="label">ទីតាំងរបស់អ្នក៖</span> <a id="mapLink" class="map-link" href="#" target="_blank">View on Map</a></p>
                </div>
                <!-- Status Message -->
                <p id="status" class="status-message text-muted">រងចាំការស្កេនរបស់អ្នក...</p>
            </div>
        </div>
      </div>
      <div class="container mt-4">
        <h2 class="text-center">📜 Scan Log History</h2>
        <table class="table table-bordered table-striped" style="font-size: 10px;">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>ឈ្មោះ</th>
                    <th>ប្រភេទស្កេន</th>
                    <th>ថ្ងៃ/ម៉ោង</th>
                    <th>ទីតាំង</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                <!-- Log data will be loaded here by JavaScript -->
            </tbody>
        </table>
      </div>
    </section>

    <script>
    // Function to automatically set the scan type based on the current time
    function setScanTypeAutomatically() {
      const currentTime = new Date();
      const currentHour = currentTime.getHours();
      const currentMinutes = currentTime.getMinutes();
      const actionSelect = document.getElementById('actionSelect');
      const scanButton = document.getElementById('scanFingerprint');

      const checkInRanges = [
        { startHour: 6, startMinute: 0, endHour: 10, endMinute: 0 },
        { startHour: 12, startMinute: 30, endHour: 13, endMinute: 10 }
      ];
      const checkOutRanges = [
        { startHour: 12, startMinute: 0, endHour: 12, endMinute: 30 },
        { startHour: 13, startMinute: 10, endHour: 22, endMinute: 0 }
      ];

      function isWithinTimeRanges(ranges) {
        return ranges.some(range =>
          (currentHour > range.startHour || (currentHour === range.startHour && currentMinutes >= range.startMinute)) &&
          (currentHour < range.endHour || (currentHour === range.endHour && currentMinutes < range.endMinute))
        );
      }

      if (isWithinTimeRanges(checkInRanges)) {
        actionSelect.value = 'Check-In';
        scanButton.disabled = false;
      } else if (isWithinTimeRanges(checkOutRanges)) {
        actionSelect.value = 'Check-Out';
        scanButton.disabled = false;
      } else {
        actionSelect.value = '';
        scanButton.disabled = true;
      }
    }

    // Run the function when the page loads and then every minute
    window.onload = function() {
        setScanTypeAutomatically();
        fetchLogs();
    };
    setInterval(setScanTypeAutomatically, 60000);

    // --- LOG HISTORY FUNCTION ---
    function fetchLogs() {
        // This feature is disabled because it requires a server connection.
        document.getElementById("logTableBody").innerHTML =
            "<tr><td colspan='5' class='text-center text-muted'>មុខងារប្រវត្តិស្កេន (Log History) ត្រូវបានបិទ។</td></tr>";
    }

    // --- GEOLOCATION AND SCANNING LOGIC ---
    const locationElement = document.getElementById('location');
    const mapLinkElement = document.getElementById('mapLink');
    const scanButton = document.getElementById('scanFingerprint');
    let currentLatitude = 0;
    let currentLongitude = 0;

    const allowedLocations = [
      { latitude: 11.55089, longitude: 104.91219 }, // Head Office
      { latitude: 11.5627950, longitude: 104.9180385 }, // Home
    ];
    const tolerance = 0.001; // Tolerance in degrees

    function isWithinAllowedLocations(latitude, longitude) {
      return allowedLocations.some(
        (location) =>
          Math.abs(latitude - location.latitude) <= tolerance &&
          Math.abs(longitude - location.longitude) <= tolerance
      );
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          currentLatitude = latitude;
          currentLongitude = longitude;
          locationElement.textContent = `Lat: ${latitude.toFixed(5)}, Long: ${longitude.toFixed(5)}`;
          mapLinkElement.href = `https://www.google.com/maps?q=${latitude},${longitude}`;

          if (!isWithinAllowedLocations(latitude, longitude)) {
            locationElement.textContent += " (ទីតាំងនេះមិនត្រឹមត្រូវទេ!)";
            scanButton.style.display = "none";
            alert("អ្នកមិនអាចស្កេនបានទេ! សូមមកកន្លែងធ្វើការរបស់អ្នកសិន!");
          } else {
            scanButton.style.display = "block";
          }
        },
        () => {
          locationElement.textContent = "មិនអាចយកទីតាំងនេះបានទេ!";
          scanButton.style.display = "none";
        }
      );
    } else {
      locationElement.textContent = "Geolocation is not supported by this browser.";
      scanButton.style.display = "none";
    }

    // --- BUTTON CLICK EVENT ---
    document.getElementById("scanFingerprint").addEventListener("click", function(e) {
      e.preventDefault();
      scanButton.disabled = true;
      document.getElementById("status").textContent = "កំពុងបញ្ជូន...";

      const userName = "សៅ សម្បត្តិ"; // Hardcoded since the dropdown is hidden
      const action = document.getElementById('actionSelect').value;
      const timestamp = new Date().toLocaleString();

      // Update UI
      document.getElementById('action').textContent = action;
      document.getElementById('timestamp').textContent = timestamp;
      document.getElementById('status').textContent = `បានបញ្ជូនសម្រាប់ ${userName}!`;

      // --- 1. SAVE TO GOOGLE SHEETS ---
      const formData = new FormData();
      formData.append("ឈ្មោះ", userName);
      formData.append("ប្រភេទស្កេន", action);
      formData.append("ថ្ងៃ", new Date().toLocaleDateString());
      formData.append("ម៉ោង", new Date().toLocaleTimeString());
      formData.append("location", `Lat: ${currentLatitude.toFixed(5)}, Long: ${currentLongitude.toFixed(5)}`);
      fetch("https://script.google.com/macros/s/AKfycbyS-hk5UE2BJsDcZ9eshieZOcncGDTJWrnYN3cMmFj5hlFFnoBKnm1e5nX3p0A_V1xFKQ/exec", {
          method: "POST",
          body: formData,
      }).then(res => console.log("Google Sheet: Success"))
        .catch(err => console.error("Google Sheet: Error", err));

      // --- 2. SEND TO TELEGRAM ---
      const mapLink = `https://www.google.com/maps?q=${currentLatitude},${currentLongitude}`;
      const messageAction = action === "Check-Out" ? "Checked out" : "Checked in";
      const telegramMessage = `ឈ្មោះ ៖ ${userName}\n**${messageAction}**\n\nID: 0163\nDepartment: IT\nPosition: IT SUPPORT\nBranch: Head Office\nថ្ងៃខែឆ្នាំ/ម៉ោង ៖ ${timestamp}\n[មើលទីតាំង] ${mapLink}`;
      const telegramURL = `https://api.telegram.org/bot7205851039:AAHBOJmY40GvNl7M0X_FN9Ml0Fg2T_KQpb8/sendMessage`;
      fetch(telegramURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: "-1002282814819", text: telegramMessage })
      }).then(res => console.log("Telegram: Success"))
        .catch(err => console.error("Telegram: Error", err));


      // --- 3. SAVE TO LOCAL PHP SERVER (This part is now disabled) ---
      /*
      fetch("save_scan.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_name: userName, scan_type: action, scan_time: new Date().toISOString(), latitude: currentLatitude, longitude: currentLongitude })
      })
      .then(response => response.text())
      .then(data => console.log("save_scan.php:", data))
      .catch(error => console.error("Error connecting to save_scan.php:", error));
      */

      // Reload the page after 1 minute to allow for another scan
      setTimeout(() => {
        window.location.reload();
      }, 60000);
    });
    </script>
</body>
</html>
