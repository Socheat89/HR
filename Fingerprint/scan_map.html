<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ផែនទីបង្ហាញទីតាំងស្កេននិងឈ្មោះអ្នកស្កេន" />
    <meta name="app-version" content="1.0.3" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3b5998">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/16461/16461372.png">
    <meta name="msapplication-TileColor" content="#3b5998">
    <title>ផែនទីទីតាំងស្កេន</title>
    <link rel="manifest" href="manifest.json?v=1.0.3">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css?v=1.0.1" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Khmer&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css?v=1.0.1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/16461/16461372.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:ital,wght@0,100..700;1,100..700&family=Noto+Sans+Khmer:wght@100..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kantumruy Pro', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(180deg, #f0f4f8, #d9e2ec);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow: auto;
            display: flex;
            flex-direction: column;
            font-size: 1rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 1rem;
        }

        .card {
            width: 100%;
            background: #fff;
            max-width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: none;
            margin: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.1);
        }

        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
        }

        h1 {
            font-size: 1.5rem;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
        }

        #map {
            height: 70vh;
            width: 100%;
            border: 1px solid #e0e0e0;
            border-radius: 0.5rem;
            background: #f0f4f8;
            margin-top: 0.5rem;
        }

        .status-message {
            font-size: 0.875rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            text-align: center;
            margin-top: 0.5rem;
            background: #fff;
            border: 1px solid #e0e0e0;
            box-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.05);
            opacity: 0;
            transform: translateY(0.5rem);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .status-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            font-weight: 600;
            border: none;
            padding: 0.875rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-primary:hover,
        .btn-primary:active {
            background: linear-gradient(135deg, #2980b9, #1f6391);
            box-shadow: 0 0.25rem 0.75rem rgba(52, 152, 219, 0.3);
        }

        .fullscreen-loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .fullscreen-loading.show {
            display: flex;
        }

        .fullscreen-loading .spinner-border {
            width: 2rem;
            height: 2rem;
            border-width: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .fullscreen-loading p {
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
        }

        .leaflet-container {
            font-family: 'Kantumruy Pro', sans-serif;
        }

        @media (max-width: 768px) {
            html {
                font-size: 14px;
            }

            .card-body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.25rem;
            }

            #map {
                height: 60vh;
            }
        }

        @supports (padding: env(safe-area-inset-top)) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="mapSection">
            <div class="card-body">
                <h1>ផែនទីទីតាំងស្កេន</h1>
                <button id="logoutButton" class="btn btn-primary mb-3">ចាកចេញ</button>
                <div id="map"></div>
                <p id="status" class="status-message">កំពុងផ្ទុកទីតាំង...</p>
            </div>
        </div>
    </div>
    <div id="loadingPopup" class="fullscreen-loading">
        <div class="spinner-border text-light" role="status"></div>
        <p>កំពុងផ្ទុកទិន្នន័យ...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const APP_VERSION = document.querySelector('meta[name="app-version"]').getAttribute('content');
        const mapSection = document.getElementById('mapSection');
        const logoutButton = document.getElementById('logoutButton');
        const statusEl = document.getElementById('status');
        const loadingPopup = document.getElementById('loadingPopup');

        // IndexedDB Setup
        const DB_NAME = 'ScanSystemDB';
        const DB_VERSION = 1;
        let db;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(new Error('Failed to open IndexedDB'));
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('loggedInUser')) {
                        db.createObjectStore('loggedInUser', { keyPath: 'key' });
                    }
                };
            });
        }

        async function getFromDB(storeName, key) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.get(key);
                request.onerror = () => reject(new Error(`Failed to get from ${storeName}`));
                request.onsuccess = () => resolve(request.result);
            });
        }

        async function clearStore(storeName) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.clear();
                request.onerror = () => reject(new Error(`Failed to clear ${storeName}`));
                request.onsuccess = () => resolve();
            });
        }

        async function checkToken(token) {
            try {
                const response = await fetch(`api.php?action=check_token&token=${encodeURIComponent(token)}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
                const result = await response.json();
                console.log('Token check result:', result);
                return result.status === 'success';
            } catch (error) {
                console.error('Token check error:', error.message);
                if (!navigator.onLine) {
                    showStatus(statusEl, 'អ្នកនៅក្រៅបណ្តាញ - បន្តប្រើ Token ចាស់');
                    return true;
                }
                showStatus(statusEl, 'មានបញ្ហាក្នុងការតភ្ជាប់ Server', 'error');
                return false;
            }
        }

        async function fetchScanLogs() {
            try {
                const user = await getFromDB('loggedInUser', 'user');
                if (!user || !user.token) {
                    throw new Error('No user logged in');
                }
                console.log('Fetching scan logs with token:', user.token);
                const response = await fetch(`api.php?action=get_scan_logs&token=${encodeURIComponent(user.token)}`);
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Failed to fetch scan logs: ${response.status} - ${errorText}`);
                }
                const result = await response.json();
                console.log('Scan logs response:', result);
                if (result.status !== 'success' || !result.data) {
                    throw new Error(result.message || 'Invalid scan log data');
                }
                return result.data; // Expected: [{username, latitude, longitude, ...}, ...]
            } catch (error) {
                console.error('Error fetching scan logs:', error);
                showStatus(statusEl, 'មិនអាចទាញទីតាំងស្កេនបាន: ' + error.message, 'error');
                return [];
            }
        }

        function initializeMap() {
            console.log('Initializing map...');
            const mapDiv = document.getElementById('map');
            if (!mapDiv) {
                console.error('Map div not found');
                showStatus(statusEl, 'មិនអាចរកឃើញធាតុផែនទី!', 'error');
                return null;
            }
            const map = L.map('map', {
                center: [11.5564, 104.9282], // Default: Phnom Penh
                zoom: 12,
                zoomControl: true
            });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19
            }).addTo(map);
            console.log('Map initialized successfully');
            return map;
        }

        async function displayScanLocations() {
            loadingPopup.classList.add('show');
            const map = initializeMap();
            if (!map) {
                loadingPopup.classList.remove('show');
                return;
            }

            const scanLogs = await fetchScanLogs();
            console.log('Scan logs received:', scanLogs);
            if (scanLogs.length === 0) {
                showStatus(statusEl, 'គ្មានទិន្នន័យស្កេនដើម្បីបង្ហាញ', 'error');
                loadingPopup.classList.remove('show');
                return;
            }

            const bounds = [];
            scanLogs.forEach(log => {
                if (log.latitude && log.longitude && log.username) {
                    const lat = parseFloat(log.latitude);
                    const lon = parseFloat(log.longitude);
                    if (!isNaN(lat) && !isNaN(lon)) {
                        L.marker([lat, lon])
                            .addTo(map)
                            .bindPopup(`<b>${log.username}</b><br>Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}`);
                        bounds.push([lat, lon]);
                        console.log(`Added marker for ${log.username} at ${lat}, ${lon}`);
                    } else {
                        console.warn(`Invalid coordinates for ${log.username}:`, log.latitude, log.longitude);
                    }
                } else {
                    console.warn('Missing required fields in log:', log);
                }
            });

            if (bounds.length > 0) {
                try {
                    map.fitBounds(bounds, { padding: [50, 50] });
                    showStatus(statusEl, `បានបង្ហាញ ${bounds.length} ទីតាំងស្កេន`, 'success');
                } catch (error) {
                    console.error('Error setting map bounds:', error);
                    showStatus(statusEl, 'មិនអាចកំណត់ជួរផែនទីបាន', 'error');
                }
            } else {
                showStatus(statusEl, 'គ្មានទីតាំងស្កេនត្រឹមត្រូវដើម្បីបង្ហាញ', 'error');
            }
            loadingPopup.classList.remove('show');
        }

        function showStatus(element, message, type = 'default') {
            element.textContent = message;
            element.classList.remove('show');
            element.style.color = type === 'success' ? '#27ae60' : '#e74c3c';
            element.style.background = type === 'success' ? 'rgba(231, 255, 231, 0.95)' : 'rgba(255, 245, 245, 0.95)';
            element.style.borderColor = type === 'success' ? '#27ae60' : '#e74c3c';
            setTimeout(() => element.classList.add('show'), 10);
        }

        async function logout() {
            const user = await getFromDB('loggedInUser', 'user');
            if (user && user.token) {
                fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'logout', token: user.token })
                }).catch(error => console.error('Logout failed:', error));
            }
            await clearStore('loggedInUser');
            window.location.href = 'index.html'; // Redirect to original login page
        }

        logoutButton.addEventListener('click', () => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>បញ្ជាក់ការចាកចេញ</h3>
                    <p>តើអ្នកប្រាកដទេថាចង់ចាកចេញ?</p>
                    <div class="modal-buttons">
                        <button id="confirmLogout" class="btn btn-primary">បាទ/ចាស</button>
                        <button id="cancelLogout" class="btn btn-secondary">ទេ</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('confirmLogout').addEventListener('click', () => {
                logout();
                document.body.removeChild(modal);
            });
            document.getElementById('cancelLogout').addEventListener('click', () => {
                document.body.removeChild(modal);
            });
        });

        window.addEventListener('load', async () => {
            console.log('Page loaded, initializing...');
            await openDB();
            const loggedInUser = await getFromDB('loggedInUser', 'user');
            if (loggedInUser && loggedInUser.token) {
                console.log('User found in IndexedDB:', loggedInUser);
                const valid = await checkToken(loggedInUser.token);
                if (valid) {
                    mapSection.style.display = 'block';
                    displayScanLocations();
                } else {
                    console.log('Invalid token, logging out');
                    logout();
                }
            } else {
                console.log('No user found, redirecting to login');
                window.location.href = 'index.html'; // Redirect to original login page
            }
        });
    </script>
</body>
</html>
