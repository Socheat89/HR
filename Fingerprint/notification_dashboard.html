
<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ផ្ទាំងគ្រប់គ្រងការជូនដំណឹង</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Khmer', 'Khmer', system-ui, -apple-system, sans-serif;
        }
        .khmer-text {
            font-family: 'Noto Sans Khmer', 'Khmer', system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-semibold text-center text-blue-600 khmer-text mb-8">
            ផ្ទាំងគ្រប់គ្រងការជូនដំណឹង
        </h1>
        
        <!-- Create Notification Form -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold text-blue-600 khmer-text mb-4">ផុសការជូនដំណឹងថ្មី</h2>
            <div id="feedback" class="hidden p-4 mb-4 rounded-lg text-center"></div>
            <form id="notificationForm" class="space-y-4">
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 khmer-text">ចំណងជើង</label>
                    <input type="text" id="title" name="title" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 khmer-text" placeholder="បញ្ចូលចំណងជើង" required maxlength="255">
                </div>
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 khmer-text">សារ</label>
                    <textarea id="message" name="message" rows="4" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 khmer-text" placeholder="បញ្ចូលសារ" required></textarea>
                </div>
                <div>
                    <label for="user_id" class="block text-sm font-medium text-gray-700 khmer-text">លេខសម្គាល់អ្នកប្រើប្រាស់ (ស្រេចចិត្ត)</label>
                    <input type="text" id="user_id" name="user_id" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 khmer-text" placeholder="បញ្ចូលលេខសម្គាល់អ្នកប្រើប្រាស់" maxlength="255">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 khmer-text">ផ្ញើការជូនដំណឹង</button>
            </form>
        </div>

        <!-- Edit Notification Form (Hidden by Default) -->
        <div id="editFormContainer" class="hidden bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold text-blue-600 khmer-text mb-4">កែសម្រួលការជូនដំណឹង</h2>
            <div id="editFeedback" class="hidden p-4 mb-4 rounded-lg text-center"></div>
            <form id="editNotificationForm" class="space-y-4">
                <input type="hidden" id="edit_id" name="id">
                <div>
                    <label for="edit_title" class="block text-sm font-medium text-gray-700 khmer-text">ចំណងជើង</label>
                    <input type="text" id="edit_title" name="title" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 khmer-text" placeholder="បញ្ចូលចំណងជើង" required maxlength="255">
                </div>
                <div>
                    <label for="edit_message" class="block text-sm font-medium text-gray-700 khmer-text">សារ</label>
                    <textarea id="edit_message" name="message" rows="4" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 khmer-text" placeholder="បញ្ចូលសារ" required></textarea>
                </div>
                <div>
                    <label for="edit_user_id" class="block text-sm font-medium text-gray-700 khmer-text">លេខសម្គាល់អ្នកប្រើប្រាស់ (ស្រេចចិត្ត)</label>
                    <input type="text" id="edit_user_id" name="user_id" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 khmer-text" placeholder="បញ្ចូលលេខសម្គាល់អ្នកប្រើប្រាស់" maxlength="255">
                </div>
                <div class="flex space-x-4">
                    <button type="submit" class="w-full bg-green-600 text-white p-2 rounded-md hover:bg-green-700 khmer-text">រក្សាទុក</button>
                    <button type="button" id="cancelEdit" class="w-full bg-gray-400 text-white p-2 rounded-md hover:bg-gray-500 khmer-text">បោះបង់</button>
                </div>
            </form>
        </div>

        <!-- Notifications Table -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-semibold text-blue-600 khmer-text mb-4">បញ្ជីការជូនដំណឹង</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-700">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 khmer-text">ចំណងជើង</th>
                            <th class="px-4 py-2 khmer-text">សារ</th>
                            <th class="px-4 py-2 khmer-text">អ្នកប្រើប្រាស់</th>
                            <th class="px-4 py-2 khmer-text">ពេលវេលា</th>
                            <th class="px-4 py-2 khmer-text">ស្ថានភាព</th>
                            <th class="px-4 py-2 khmer-text">សកម្មភាព</th>
                        </tr>
                    </thead>
                    <tbody id="notificationTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Base API URL (replace with your actual domain)
        const API_BASE_URL = 'http://your-domain.com';

        // Show feedback message
        function showFeedback(elementId, message, isSuccess) {
            const feedback = document.getElementById(elementId);
            feedback.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            feedback.classList.add(isSuccess ? 'bg-green-100' : 'bg-red-100', isSuccess ? 'text-green-700' : 'text-red-700');
            feedback.textContent = message;
            setTimeout(() => feedback.classList.add('hidden'), 5000);
        }

        // Fetch and display notifications
        async function loadNotifications() {
            try {
                const response = await fetch(`notifications_api.php?action=get_notifications`);
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const data = await response.json();
                if (data.status === 'success') {
                    const tableBody = document.getElementById('notificationTable');
                    tableBody.innerHTML = data.notifications.map(n => `
                        <tr class="border-b">
                            <td class="px-4 py-2 khmer-text">${n.title}</td>
                            <td class="px-4 py-2 khmer-text">${n.message.substring(0, 50)}${n.message.length > 50 ? '...' : ''}</td>
                            <td class="px-4 py-2 khmer-text">${n.user_id || 'ទាំងអស់'}</td>
                            <td class="px-4 py-2 khmer-text">${new Date(n.time).toLocaleString('km-KH')}</td>
                            <td class="px-4 py-2 khmer-text">${n.read_status ? 'បានអាន' : 'មិនទាន់អាន'}</td>
                            <td class="px-4 py-2">
                                <button onclick="editNotification(${n.id}, '${n.title}', '${n.message.replace(/'/g, "\\'")}', '${n.user_id || ''}')" class="text-blue-600 hover:underline khmer-text">កែ</button>
                                <button onclick="deleteNotification(${n.id})" class="text-red-600 hover:underline khmer-text ml-2">លុប</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    showFeedback('feedback', data.message || 'មានបញ្ហាក្នុងការទាញទិន្នន័យ', false);
                }
            } catch (error) {
                console.error('Load notifications error:', error);
                showFeedback('feedback', `កំហុសបណ្តាញ: មិនអាចទាញទិន្នន័យ (${error.message})`, false);
            }
        }

        // Create notification
        document.getElementById('notificationForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const message = document.getElementById('message').value.trim();
            const user_id = document.getElementById('user_id').value.trim() || null;

            try {
                const response = await fetch(`notifications_api.php?action=push_notification`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, message, user_id })
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const data = await response.json();
                if (data.status === 'success') {
                    showFeedback('feedback', 'ការជូនដំណឹងបានផ្ញើដោយជោគជ័យ!', true);
                    document.getElementById('notificationForm').reset();
                    loadNotifications();
                } else {
                    showFeedback('feedback', data.message || 'មានបញ្ហាក្នុងការផ្ញើការជូនដំណឹង', false);
                }
            } catch (error) {
                console.error('Create notification error:', error);
                showFeedback('feedback', `កំហុសបណ្តាញ: មិនអាចភ្ជាប់ទៅ API (${error.message})`, false);
            }
        });

        // Edit notification
        function editNotification(id, title, message, user_id) {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_title').value = title;
            document.getElementById('edit_message').value = message;
            document.getElementById('edit_user_id').value = user_id;
            document.getElementById('editFormContainer').classList.remove('hidden');
            document.getElementById('notificationForm').classList.add('hidden');
        }

        document.getElementById('editNotificationForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const title = document.getElementById('edit_title').value.trim();
            const message = document.getElementById('edit_message').value.trim();
            const user_id = document.getElementById('edit_user_id').value.trim() || null;

            try {
                const response = await fetch(`notifications_api.php?action=edit_notification`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, title, message, user_id })
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const data = await response.json();
                if (data.status === 'success') {
                    showFeedback('editFeedback', 'ការជូនដំណឹងបានកែសម្រួលដោយជោគជ័យ!', true);
                    document.getElementById('editNotificationForm').reset();
                    document.getElementById('editFormContainer').classList.add('hidden');
                    document.getElementById('notificationForm').classList.remove('hidden');
                    loadNotifications();
                } else {
                    showFeedback('editFeedback', data.message || 'មានបញ្ហាក្នុងការកែសម្រួលការជូនដំណឹង', false);
                }
            } catch (error) {
                console.error('Edit notification error:', error);
                showFeedback('editFeedback', `កំហុសបណ្តាញ: មិនអាចភ្ជាប់ទៅ API (${error.message})`, false);
            }
        });

        document.getElementById('cancelEdit').addEventListener('click', () => {
            document.getElementById('editNotificationForm').reset();
            document.getElementById('editFormContainer').classList.add('hidden');
            document.getElementById('notificationForm').classList.remove('hidden');
        });

        // Delete notification
        async function deleteNotification(id) {
            if (!confirm('តើអ្នកប្រាកដជាចង់លុបការជូនដំណឹងនេះមែនទេ?')) return;
            try {
                const response = await fetch(`notifications_api.php?action=delete_notification`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                const data = await response.json();
                if (data.status === 'success') {
                    showFeedback('feedback', 'ការជូនដំណឹងបានលុបដោយជោគជ័យ!', true);
                    loadNotifications();
                } else {
                    showFeedback('feedback', data.message || 'មានបញ្ហាក្នុងការលុបការជូនដំណឹង', false);
                }
            } catch (error) {
                console.error('Delete notification error:', error);
                showFeedback('feedback', `កំហុសបណ្តាញ: មិនអាចភ្ជាប់ទៅ API (${error.message})`, false);
            }
        }

        // Load notifications on page load
        window.addEventListener('DOMContentLoaded', loadNotifications);
    </script>
</body>
</html>
