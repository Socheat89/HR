<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login/Signup - Fingerprint System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { 
      background-color: #f8f9fa; 
      height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
    }
    .card { 
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); 
      border-radius: 10px; 
      padding: 20px; 
      background-color: white; 
      max-width: 400px; 
      width: 100%; 
    }
    .btn-primary { 
      background-color: #007bff; 
      color: white; 
      transition: background-color 0.3s; 
    }
    .btn-primary:hover { 
      background-color: #0056b3; 
    }
    .btn-link { 
      cursor: pointer; 
    }
    h3 { 
      color: #343a40; 
    }
    .form-toggle { 
      text-align: center; 
      margin-top: 15px; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card">
          <!-- Login Form -->
          <div id="loginSection" style="display: block;">
            <h3 class="text-center mb-4">ចូលប្រព័ន្ធអ្នកគ្រប់គ្រង</h3>
            <form id="loginForm">
              <div class="mb-3">
                <label for="loginUsername" class="form-label">ឈ្មោះអ្នកគ្រប់គ្រង</label>
                <input type="text" class="form-control" id="loginUsername" name="username" required placeholder="បញ្ចូលឈ្មោះ" />
              </div>
              <div class="mb-3">
                <label for="loginPassword" class="form-label">លេខសម្ងាត់</label>
                <input type="password" class="form-control" id="loginPassword" name="password" required placeholder="បញ្ចូលលេខសម្ងាត់" />
              </div>
              <button type="submit" class="btn btn-primary w-100">ចូល</button>
            </form>
            <div class="form-toggle">
              <p>មិនទាន់មានគណនី? <span class="btn-link text-primary" onclick="toggleForm('signup')">ចុះឈ្មោះ</span></p>
            </div>
            <p id="loginErrorMessage" class="text-danger text-center mt-3" style="display: none;"></p>
          </div>

          <!-- Signup Form -->
          <div id="signupSection" style="display: none;">
            <h3 class="text-center mb-4">ចុះឈ្មោះអ្នកគ្រប់គ្រង</h3>
            <form id="signupForm">
              <div class="mb-3">
                <label for="signupUsername" class="form-label">ឈ្មោះអ្នកគ្រប់គ្រង</label>
                <input type="text" class="form-control" id="signupUsername" name="username" required placeholder="បញ្ចូលឈ្មោះ" />
              </div>
              <div class="mb-3">
                <label for="signupPassword" class="form-label">លេខសម្ងាត់</label>
                <input type="password" class="form-control" id="signupPassword" name="password" required placeholder="បញ្ចូលលេខសម្ងាត់" />
              </div>
              <div class="mb-3">
                <label for="signupConfirmPassword" class="form-label">បញ្ជាក់លេខសម្ងាត់</label>
                <input type="password" class="form-control" id="signupConfirmPassword" name="confirmPassword" required placeholder="បញ្ជាក់លេខសម្ងាត់" />
              </div>
              <button type="submit" class="btn btn-primary w-100">ចុះឈ្មោះ</button>
            </form>
            <div class="form-toggle">
              <p>មានគណនីរួចហើយ? <span class="btn-link text-primary" onclick="toggleForm('login')">ចូល</span></p>
            </div>
            <p id="signupErrorMessage" class="text-danger text-center mt-3" style="display: none;"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Toggle between login and signup forms
    function toggleForm(formType) {
      const loginSection = document.getElementById('loginSection');
      const signupSection = document.getElementById('signupSection');
      if (formType === 'signup') {
        loginSection.style.display = 'none';
        signupSection.style.display = 'block';
      } else {
        loginSection.style.display = 'block';
        signupSection.style.display = 'none';
      }
    }

    // Login Form Submission
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const data = Object.fromEntries(formData);
      const errorMessage = document.getElementById('loginErrorMessage');

      try {
        const response = await fetch('admin_login.php', {
          method: 'POST',
          body: JSON.stringify(data),
          headers: { 'Content-Type': 'application/json' }
        });
        const result = await response.json();
        if (result.status === 'success') {
          localStorage.setItem('adminLoggedIn', 'true');
          window.location.href = 'admin_panel.html';
        } else {
          errorMessage.textContent = result.message || 'ឈ្មោះអ្នកប្រើ ឬលេខសម្ងាត់មិនត្រឹមត្រូវ!';
          errorMessage.style.display = 'block';
          setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
        }
      } catch (error) {
        errorMessage.textContent = 'មានបញ្ហាក្នុងការតភ្ជាប់!';
        errorMessage.style.display = 'block';
        setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
      }
    });

    // Signup Form Submission
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const data = Object.fromEntries(formData);
      const errorMessage = document.getElementById('signupErrorMessage');

      // Client-side password confirmation check
      if (data.password !== data.confirmPassword) {
        errorMessage.textContent = 'លេខសម្ងាត់មិនត្រូវគ្នា!';
        errorMessage.style.display = 'block';
        setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
        return;
      }

      try {
        const response = await fetch('admin_signup.php', {
          method: 'POST',
          body: JSON.stringify({ username: data.username, password: data.password }),
          headers: { 'Content-Type': 'application/json' }
        });
        const result = await response.json();
        if (result.status === 'success') {
          errorMessage.textContent = 'ចុះឈ្មោះជោគជ័យ! សូមចូលប្រើ។';
          errorMessage.style.color = 'green';
          errorMessage.style.display = 'block';
          setTimeout(() => {
            errorMessage.style.display = 'none';
            toggleForm('login');
            this.reset();
          }, 2000);
        } else {
          errorMessage.textContent = result.message || 'មានបញ្ហាក្នុងការចុះឈ្មោះ!';
          errorMessage.style.display = 'block';
          setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
        }
      } catch (error) {
        errorMessage.textContent = 'មានបញ្ហាក្នុងការតភ្ជាប់!';
        errorMessage.style.display = 'block';
        setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
      }
    });
  </script>
</body>
</html>
