<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Fingerprint System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .navbar { background-color: #007bff; }
    .navbar-brand, .nav-link { color: white !important; }
    .section { margin: 20px 0; }
    .btn-add { background-color: #28a745; color: white; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Admin Panel</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#" id="logout">ចាកចេញ</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Time Ranges -->
    <div class="section">
      <h3>ជួរពេលវេលា (Check-In/Check-Out)</h3>
      <button class="btn btn-add mb-3" data-bs-toggle="modal" data-bs-target="#addTimeRangeModal">បន្ថែម</button>
      <table class="table table-striped">
        <thead><tr><th>ប្រភេទ</th><th>ចាប់ផ្តើម</th><th>បញ្ចប់</th><th>សកម្មភាព</th></tr></thead>
        <tbody id="timeRangesTable"></tbody>
      </table>
    </div>

    <!-- Scan Status Ranges -->
    <div class="section">
      <h3>កំណត់ស្ថានភាពស្កេន</h3>
      <button class="btn btn-add mb-3" data-bs-toggle="modal" data-bs-target="#addScanStatusModal">បន្ថែម</button>
      <table class="table table-striped">
        <thead><tr><th>ចាប់ផ្តើម</th><th>បញ្ចប់</th><th>ស្ថានភាព</th><th>សកម្មភាព</th></tr></thead>
        <tbody id="scanStatusTable"></tbody>
      </table>
    </div>

    <!-- Dropdown Options -->
    <div class="section">
      <h3>បញ្ជីជម្រើស</h3>
      <button class="btn btn-add mb-3" data-bs-toggle="modal" data-bs-target="#addDropdownModal">បន្ថែម</button>
      <table class="table table-striped">
        <thead><tr><th>ប្រភេទ</th><th>តម្លៃ</th><th>សកម្មភាព</th></tr></thead>
        <tbody id="dropdownOptionsTable"></tbody>
      </table>
    </div>

    <!-- Allowed Locations -->
    <div class="section">
      <h3>ទីតាំងអនុញ្ញាត</h3>
      <button class="btn btn-add mb-3" data-bs-toggle="modal" data-bs-target="#addLocationModal">បន្ថែម</button>
      <table class="table table-striped">
        <thead><tr><th>Latitude</th><th>Longitude</th><th>ពិពណ៌នា</th><th>សកម្មភាព</th></tr></thead>
        <tbody id="allowedLocationsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal for Time Ranges -->
  <div class="modal fade" id="addTimeRangeModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5>បន្ថែមជួរពេលវេលា</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="addTimeRangeForm">
            <input type="hidden" name="id" id="timeRangeId">
            <div class="mb-3"><label>ប្រភេទ</label><select class="form-select" id="timeRangeType" name="timeRangeType" required><option value="Check-In">Check-In</option><option value="Check-Out">Check-Out</option></select></div>
            <div class="mb-3"><label>ចាប់ផ្តើម (ម៉ោង:នាទី)</label><input type="number" class="form-control" id="startHour" name="startHour" min="0" max="23" required /><input type="number" class="form-control" id="startMinute" name="startMinute" min="0" max="59" required /></div>
            <div class="mb-3"><label>បញ្ចប់ (ម៉ោង:នាទី)</label><input type="number" class="form-control" id="endHour" name="endHour" min="0" max="23" required /><input type="number" class="form-control" id="endMinute" name="endMinute" min="0" max="59" required /></div>
            <button type="submit" class="btn btn-primary">រក្សាទុក</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for Scan Status -->
  <div class="modal fade" id="addScanStatusModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5>បន្ថែមស្ថានភាពស្កេន</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="addScanStatusForm">
            <input type="hidden" name="id" id="scanStatusId">
            <div class="mb-3"><label>ចាប់ផ្តើម (ម៉ោង:នាទី)</label><input type="number" class="form-control" id="scanStartHour" name="scanStartHour" min="0" max="23" required /><input type="number" class="form-control" id="scanStartMinute" name="scanStartMinute" min="0" max="59" required /></div>
            <div class="mb-3"><label>បញ្ចប់ (ម៉ោង:នាទី)</label><input type="number" class="form-control" id="scanEndHour" name="scanEndHour" min="0" max="23" required /><input type="number" class="form-control" id="scanEndMinute" name="scanEndMinute" min="0" max="59" required /></div>
            <div class="mb-3"><label>ស្ថានភាព</label><select class="form-select" id="scanStatus" name="scanStatus" required><option value="🔵Good">Good</option><option value="🔴Late">Late</option></select></div>
            <button type="submit" class="btn btn-primary">រក្សាទុក</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for Dropdown Options -->
  <div class="modal fade" id="addDropdownModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5>បន្ថែមជម្រើស</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="addDropdownForm">
            <input type="hidden" name="id" id="dropdownId">
            <div class="mb-3"><label>ប្រភេទ</label><select class="form-select" id="dropdownCategory" name="dropdownCategory" required><option value="userName">ឈ្មោះ</option><option value="id">ID</option><option value="department">នាយកដ្ឋាន</option><option value="position">តួនាទី</option><option value="branch">សាខា</option><option value="folder">Folder</option></select></div>
            <div class="mb-3"><label>តម្លៃ</label><input type="text" class="form-control" id="dropdownValue" name="dropdownValue" required /></div>
            <button type="submit" class="btn btn-primary">រក្សាទុក</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal for Allowed Locations -->
  <div class="modal fade" id="addLocationModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5>បន្ថែមទីតាំង</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="addLocationForm">
            <input type="hidden" name="id" id="locationId">
            <div class="mb-3"><label>Latitude</label><input type="number" step="0.000001" class="form-control" id="locationLatitude" name="locationLatitude" required /></div>
            <div class="mb-3"><label>Longitude</label><input type="number" step="0.000001" class="form-control" id="locationLongitude" name="locationLongitude" required /></div>
            <div class="mb-3"><label>ពិពណ៌នា</label><input type="text" class="form-control" id="locationDescription" name="locationDescription" /></div>
            <button type="submit" class="btn btn-primary">រក្សាទុក</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Check authentication
    if (!localStorage.getItem('adminLoggedIn')) window.location.href = 'worker/admin_login.html';
    document.getElementById('logout').addEventListener('click', () => {
      localStorage.removeItem('adminLoggedIn');
      window.location.href = 'admin_login.html';
    });

    // Fetch data function
    async function fetchData(endpoint, tableId, renderFunc) {
      try {
        const response = await fetch(endpoint);
        const data = await response.json();
        const tableBody = document.getElementById(tableId);
        tableBody.innerHTML = '';
        data.forEach((item, index) => tableBody.innerHTML += renderFunc(item, index));
      } catch (error) {
        console.error(`Error fetching ${endpoint}:`, error);
      }
    }

    // Render and fetch Time Ranges
    const renderTimeRange = (item, index) => `
      <tr>
        <td>${item.type}</td>
        <td>${item.start_hour}:${item.start_minute.toString().padStart(2, '0')}</td>
        <td>${item.end_hour}:${item.end_minute.toString().padStart(2, '0')}</td>
        <td><button class="btn btn-warning btn-sm" onclick="editItem('timeRanges', ${item.id})">កែ</button> <button class="btn btn-danger btn-sm" onclick="deleteItem('timeRanges', ${item.id})">លុប</button></td>
      </tr>`;
    fetchData('/admin/get_time_ranges.php', 'timeRangesTable', renderTimeRange);

    // Render and fetch Scan Status
    const renderScanStatus = (item, index) => `
      <tr>
        <td>${item.start_hour}:${item.start_minute.toString().padStart(2, '0')}</td>
        <td>${item.end_hour}:${item.end_minute.toString().padStart(2, '0')}</td>
        <td>${item.status}</td>
        <td><button class="btn btn-warning btn-sm" onclick="editItem('scanStatus', ${item.id})">កែ</button> <button class="btn btn-danger btn-sm" onclick="deleteItem('scanStatus', ${item.id})">លុប</button></td>
      </tr>`;
    fetchData('/admin/get_scan_status.php', 'scanStatusTable', renderScanStatus);

    // Render and fetch Dropdown Options
    const renderDropdown = (item, index) => `
      <tr>
        <td>${item.category}</td>
        <td>${item.value}</td>
        <td><button class="btn btn-warning btn-sm" onclick="editItem('dropdownOptions', ${item.id})">កែ</button> <button class="btn btn-danger btn-sm" onclick="deleteItem('dropdownOptions', ${item.id})">លុប</button></td>
      </tr>`;
    fetchData('/admin/get_dropdown_options.php', 'dropdownOptionsTable', renderDropdown);

    // Render and fetch Allowed Locations
    const renderLocation = (item, index) => `
      <tr>
        <td>${item.latitude}</td>
        <td>${item.longitude}</td>
        <td>${item.description || ''}</td>
        <td><button class="btn btn-warning btn-sm" onclick="editItem('allowedLocations', ${item.id})">កែ</button> <button class="btn btn-danger btn-sm" onclick="deleteItem('allowedLocations', ${item.id})">លុប</button></td>
      </tr>`;
    fetchData('/admin/get_allowed_locations.php', 'allowedLocationsTable', renderLocation);

    // Add or Update data function
    async function saveData(formId, endpoint, tableId, renderFunc) {
      document.getElementById(formId).addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);
        const method = data.id ? 'PUT' : 'POST';
        const url = data.id ? `${endpoint.replace('add', 'update')}` : endpoint;

        try {
          await fetch(url, { 
            method: method, 
            body: JSON.stringify(data), 
            headers: { 'Content-Type': 'application/json' } 
          });
          fetchData(endpoint.replace('add', 'get'), tableId, renderFunc);
          bootstrap.Modal.getInstance(document.getElementById(formId.replace('Form', ''))).hide();
          e.target.reset();
        } catch (error) {
          console.error(`Error saving to ${url}:`, error);
        }
      });
    }

    saveData('addTimeRangeForm', '/admin/add_time_range.php', 'timeRangesTable', renderTimeRange);
    saveData('addScanStatusForm', '/admin/add_scan_status.php', 'scanStatusTable', renderScanStatus);
    saveData('addDropdownForm', '/admin/add_dropdown_option.php', 'dropdownOptionsTable', renderDropdown);
    saveData('addLocationForm', '/admin/add_allowed_location.php', 'allowedLocationsTable', renderLocation);

    // Edit function
    async function editItem(type, id) {
      const response = await fetch(`/admin/get_${type}.php`);
      const data = await response.json();
      const item = data.find(i => i.id === id);
      const modalId = `add${type.charAt(0).toUpperCase() + type.slice(1)}Modal`;
      const formId = `add${type.charAt(0).toUpperCase() + type.slice(1)}Form`;

      if (type === 'timeRanges') {
        document.getElementById('timeRangeId').value = item.id;
        document.getElementById('timeRangeType').value = item.type;
        document.getElementById('startHour').value = item.start_hour;
        document.getElementById('startMinute').value = item.start_minute;
        document.getElementById('endHour').value = item.end_hour;
        document.getElementById('endMinute').value = item.end_minute;
      } else if (type === 'scanStatus') {
        document.getElementById('scanStatusId').value = item.id;
        document.getElementById('scanStartHour').value = item.start_hour;
        document.getElementById('scanStartMinute').value = item.start_minute;
        document.getElementById('scanEndHour').value = item.end_hour;
        document.getElementById('scanEndMinute').value = item.end_minute;
        document.getElementById('scanStatus').value = item.status;
      } else if (type === 'dropdownOptions') {
        document.getElementById('dropdownId').value = item.id;
        document.getElementById('dropdownCategory').value = item.category;
        document.getElementById('dropdownValue').value = item.value;
      } else if (type === 'allowedLocations') {
        document.getElementById('locationId').value = item.id;
        document.getElementById('locationLatitude').value = item.latitude;
        document.getElementById('locationLongitude').value = item.longitude;
        document.getElementById('locationDescription').value = item.description || '';
      }

      new bootstrap.Modal(document.getElementById(modalId)).show();
    }

    // Delete function
    async function deleteItem(type, id) {
      if (confirm('តើអ្នកប្រាកដជាចង់លុបទិន្នន័យនេះមែនទេ?')) {
        await fetch(`/admin/delete_${type}.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        fetchData(`/admin/get_${type}.php`, `${type}Table`, eval(`render${type.charAt(0).toUpperCase() + type.slice(1)}`));
      }
    }
  </script>
</body>
</html>
