<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Fingerprint System</title>
  <!-- Reuse existing CSS and libraries -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Khmer&display=swap" rel="stylesheet" />
  <style>
    /* Reuse your existing styles */
    /* Add additional styles for admin panel if needed */
    .admin-table { margin-top: 20px; }
    .admin-form { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container mt-5 main-header">
    <h1 class="text-center" style="text-decoration: underline; color: rgb(0, 0, 0);">Admin Panel</h1>
    
    <!-- Form to Add/Edit User -->
    <div class="card mt-4 admin-form">
      <div class="card-body">
        <form id="userForm">
          <div class="mb-3">
            <label class="form-label">ឈ្មោះ</label>
            <input type="text" id="username" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">ID</label>
            <input type="text" id="user_id" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">នាយកដ្ឋាន</label>
            <input type="text" id="department" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">តួនាទី</label>
            <input type="text" id="position" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">សាខា</label>
            <input type="text" id="branch" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Folder</label>
            <input type="text" id="folder" class="form-control" />
          </div>
          <button type="submit" class="btn btn-primary">រក្សាទុក</button>
          <button type="button" id="clearForm" class="btn btn-secondary">សម្អាត</button>
        </form>
      </div>
    </div>

    <!-- Table to Display Users -->
    <div class="card admin-table">
      <div class="card-body">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>ឈ្មោះ</th>
              <th>ID</th>
              <th>នាយកដ្ឋាន</th>
              <th>តួនាទី</th>
              <th>សាខា</th>
              <th>Folder</th>
              <th>សកម្មភាព</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    let editId = null;

    // Fetch and display users
    function loadUsers() {
      fetch('users.php')
        .then(response => response.json())
        .then(data => {
          const tbody = document.getElementById('userTable');
          tbody.innerHTML = '';
          data.forEach(user => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${user.username}</td>
              <td>${user.user_id}</td>
              <td>${user.department || 'N/A'}</td>
              <td>${user.position || 'N/A'}</td>
              <td>${user.branch || 'N/A'}</td>
              <td>${user.folder || 'N/A'}</td>
              <td>
                <button class="btn btn-sm btn-warning" onclick="editUser(${user.id})">កែ</button>
                <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">លុប</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        });
    }

    // Submit form (Add or Update)
    document.getElementById('userForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const userData = {
        username: document.getElementById('username').value,
        user_id: document.getElementById('user_id').value,
        department: document.getElementById('department').value,
        position: document.getElementById('position').value,
        branch: document.getElementById('branch').value,
        folder: document.getElementById('folder').value
      };

      const url = editId ? `update_user.php?id=${editId}` : 'add_user.php';
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(userData)
      }).then(() => {
        loadUsers();
        clearForm();
      });
    });

    // Edit user
    function editUser(id) {
      fetch(`users.php?id=${id}`)
        .then(response => response.json())
        .then(user => {
          document.getElementById('username').value = user.username;
          document.getElementById('user_id').value = user.user_id;
          document.getElementById('department').value = user.department || '';
          document.getElementById('position').value = user.position || '';
          document.getElementById('branch').value = user.branch || '';
          document.getElementById('folder').value = user.folder || '';
          editId = id;
        });
    }

    // Delete user
    function deleteUser(id) {
      if (confirm('តើអ្នកប្រាកដទេថាចង់លុប?')) {
        fetch(`delete_user.php?id=${id}`, { method: 'DELETE' })
          .then(() => loadUsers());
      }
    }

    // Clear form
    document.getElementById('clearForm').addEventListener('click', clearForm);
    function clearForm() {
      document.getElementById('userForm').reset();
      editId = null;
    }

    // Load users on page load
    window.onload = loadUsers;
  </script>
</body>
</html>
