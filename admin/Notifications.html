<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Notifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="p-10 bg-gray-100">

  <div class="relative inline-block">
    <button onclick="toggleNotifDropdown()" class="text-white bg-indigo-600 px-4 py-2 rounded relative">
      <i class="fas fa-bell"></i>
      <span id="notif-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
    </button>

    <!-- Dropdown -->
    <div id="notif-dropdown" class="hidden absolute right-0 mt-2 w-80 bg-white border rounded shadow z-50">
      <div class="p-4 max-h-96 overflow-y-auto">
        <h3 class="font-bold text-gray-700 mb-2">Notifications</h3>
        <div id="notif-list" class="space-y-2 text-sm text-gray-700">Loading...</div>
      </div>
    </div>
  </div>

  <div class="mt-10">
    <button onclick="addTestNotif()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
      + Add Test Notification
    </button>
  </div>

  <script>
    function toggleNotifDropdown() {
      const dropdown = document.getElementById('notif-dropdown');
      dropdown.classList.toggle('hidden');
      fetchNotifs();
    }

    function fetchNotifs() {
      fetch('fetch_notifications.php')
        .then(res => res.json())
        .then(data => {
          document.getElementById('notif-count').textContent = data.length;
          const list = document.getElementById('notif-list');
          list.innerHTML = '';
          if (data.length === 0) {
            list.innerHTML = '<p class="text-gray-500">គ្មានការជូនដំណឹង</p>';
          } else {
            data.forEach(n => {
              const item = document.createElement('div');
              item.className = 'p-2 bg-gray-100 rounded hover:bg-gray-200';
              item.textContent = n.message;
              list.appendChild(item);
            });
          }
        });
    }

    function addTestNotif() {
      fetch('add_notification.php')
        .then(() => {
          alert('បញ្ចូលការជូនដំណឹងថ្មី!');
          fetchNotifs();
        });
    }

    setInterval(fetchNotifs, 20000); // auto refresh every 20 sec
    window.onload = fetchNotifs;
  </script>

</body>
</html>
