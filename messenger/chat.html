<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ឆាតអន្តរកម្ម</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .chat-box {
            height: 60vh;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 80%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 15px;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            word-break: break-word;
        }
        .user-message {
            background: #007bff;
            color: white;
            margin-left: auto;
        }
        .other-message {
            background: #e9ecef;
            margin-right: auto;
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- ទម្រង់ចុះឈ្មោះ -->
        <div id="loginSection" class="card mb-4">
            <div class="card-body">
                <h3 class="text-center mb-3">ចូលឆាត</h3>
                <div class="input-group">
                    <input type="text" id="username" class="form-control" placeholder="ឈ្មោះអ្នកប្រើ">
                    <button class="btn btn-primary" onclick="setupUser()">ចូល</button>
                </div>
            </div>
        </div>

        <!-- ផ្ទះសន្ទនា -->
        <div id="chatSection" style="display: none;">
            <div class="card shadow">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0" id="greetingText"></h4>
                    <button class="btn btn-light btn-sm" onclick="resetChat()">ចាកចេញ</button>
                </div>
                
                <div class="card-body">
                    <div class="chat-box mb-3" id="messageContainer"></div>
                    
                    <div class="input-group">
                        <input type="text" id="messageInput" class="form-control" 
                               placeholder="វាយសាររបស់អ្នក..." 
                               onkeypress="handleEnter(event)">
                        <button class="btn btn-primary" onclick="sendMessage()">ផ្ញើ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let isScrolled = false;

        // ចាប់ផ្តើម
        function init() {
            currentUser = localStorage.getItem('currentChatUser');
            if(currentUser) showChatInterface();
            loadMessages();
            setInterval(checkNewMessages, 1000);
        }

        // កំណត់អ្នកប្រើ
        function setupUser() {
            const username = document.getElementById('username').value.trim();
            if(username) {
                currentUser = username;
                localStorage.setItem('currentChatUser', username);
                showChatInterface();
            }
        }

        // បង្ហាញផ្ទះសន្ទនា
        function showChatInterface() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('chatSection').style.display = 'block';
            document.getElementById('greetingText').textContent = `សួស្តី ${currentUser}!`;
            scrollToBottom();
        }

        // ផ្ញើសារ
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if(message && currentUser) {
                const messages = JSON.parse(localStorage.getItem('chatData') || '[]');
                const newMessage = {
                    user: currentUser,
                    text: message,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                
                messages.push(newMessage);
                localStorage.setItem('chatData', JSON.stringify(messages));
                
                messageInput.value = '';
                appendMessage(newMessage);
                scrollToBottom();
            }
        }

        // បន្ថែមសារថ្មី
        function appendMessage(msg) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${msg.user === currentUser ? 'user-message' : 'other-message'}`;
            messageDiv.innerHTML = `
                <div class="fw-bold">${msg.user}</div>
                ${msg.text}
                <div class="text-end small mt-1">${msg.time}</div>
            `;
            container.appendChild(messageDiv);
        }

        // ផ្ទុកសារ
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('chatData') || '[]');
            messages.forEach(msg => appendMessage(msg));
        }

        // ពិនិត្យសារថ្មី
        function checkNewMessages() {
            const oldCount = document.getElementById('messageContainer').children.length;
            const newCount = JSON.parse(localStorage.getItem('chatData') || '[]').length;
            
            if(newCount > oldCount) {
                loadMessages();
                if(isScrolled) scrollToBottom();
            }
        }

        // រំកិលទៅក្រោម
        function scrollToBottom() {
            const container = document.getElementById('messageContainer');
            container.scrollTo({
                top: container.scrollHeight,
                behavior: 'smooth'
            });
            isScrolled = true;
        }

        // គ្រប់គ្រងគ្រាប់ Enter
        function handleEnter(e) {
            if(e.key === 'Enter') sendMessage();
        }

        // កំណត់ឡើងវិញ
        function resetChat() {
            localStorage.removeItem('currentChatUser');
            localStorage.removeItem('chatData');
            location.reload();
        }

        // តាមដានការរំកិល
        document.getElementById('messageContainer').onscroll = function() {
            isScrolled = (this.scrollHeight - this.clientHeight) <= this.scrollTop + 10;
        };

        // ចាប់ផ្តើមកម្មវិធី
        window.onload = init;
    </script>
</body>
</html>
