<div id="page-1" class="page">
<div class="form-container container">
        <h2>Meeting Registration</h2>
        <form id="form" onsubmit=" return sender()"  method="POST">
            <div class="form-group">
                <label for="name">អត្តលេខ</label>
                <input type="text" id="name" name="អត្តលេខ"  required>
            </div>
            <div class="form-group">
                <label for="email">ឈ្មោះ</label>
                <input type="text" id="email" name="ឈ្មោះ"  required>
                <span class="error-message" id="emailError"></span>
            </div>
            <div class="form-group">
              <label class="label">ភេទ</label>
                <select class="label" name="ភេទ" id="typeofrequest" required>
                  <option value="">សូមជ្រើសរើស</option>
                  <option value="ប្រុស">ប្រុស</option>
                  <option value="ស្រី">ស្រី</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">ថ្ងៃខែឆ្នាំ</label>
                <input type="date" id="date" name="ថ្ងៃខែឆ្នាំ" required>
            </div>
            <div class="form-group">
                <label for="date">ម៉ោងប្រជុំ</label>
                <input type="time" id="date" name="ម៉ោងប្រជុំ" required>
            </div>
            <div class="form-group">
              <label class="label">ទីតាំង</label>
                <select class="label" name="ទីតាំងប្រជុំ" id="typeofrequest" required>
                  <option value="">សូមជ្រើសរើស</option>
                  <option value="ការិយាល័យកណ្តាល">ការិយាល័យកណ្តាល</option>
                  <option value="ឃ្លាំង CH1">ឃ្លាំង CH1</option>
                  <option value="ឃ្លាំង CKD">ឃ្លាំង CKD</option>
                </select>
            </div>
            <div class="form-group">
              <label class="label">ប្រភេទនៃការប្រជុំ</label>
                <select class="label" name="ប្រភេទនៃការប្រជុំ" id="typeofrequest" required>
                  <option value="">សូមជ្រើសរើស</option>
                  <option value="ការប្រជុំប្រចាំខែ">ការប្រជុំប្រចាំខែ</option>
                  <option value="ការប្រជុំផ្នែកស្តុក CH1">ការប្រជុំផ្នែកស្តុក CH1</option>
                  <option value="ការប្រជុំផ្នែកស្តុក 318">ការប្រជុំផ្នែកស្តុក 318</option>
                  <option value="ការប្រជុំបុគ្គលិកផ្នែកបើក CH1">ការប្រជុំបុគ្គលិកផ្នែកបើក CH1</option>
                </select>
              </div>
                  <div class="form-group">
                <label for="email">មូលហេតុ</label>
                <input type="text" id="email" name="មូលហេតុ"  required>
                <span class="error-message" id="emailError"></span>
            </div>
            <button type="submit" id="submit-button">ចុចឈ្មោះ</button>

        </div>
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="ស្វែងរកតាមឈ្មោះ ឬ អត្តលេខ" oninput="filterMeetings(document.querySelector('.filter-section button.active')?.dataset.status || 'all', document.getElementById('meetingTypeFilter').value, this.value)">
            <button class="btn btn-info" onclick="filterMeetings(document.querySelector('.filter-section button.active')?.dataset.status || 'all', document.getElementById('meetingTypeFilter').value, document.getElementById('searchInput').value)">
                <i class="fas fa-search"></i> ស្វែងរក
            </button>
        </div>
        <div id="loading" class="loading">កំពុងផ្ទុកទិន្នន័យ...</div>
        <table id="meetingTable" style="display: none;">
            <thead>
                <tr class="th">
                    <th class="text-white">អត្តលេខ</th>
                    <th class="text-white">ឈ្មោះ</th>
                    <th class="text-white">ភេទ</th>
                    <th class="text-white">ថ្ងៃខែឆ្នាំ</th>
                    <th class="text-white">ម៉ោង</th>
                    <th class="text-white">ទីតាំង</th>
                    <th class="text-white">ប្រភេទប្រជុំ</th>
                    <th class="text-white">មូលហេតុ</th>
                    <th class="text-white">ស្ថានភាព</th>
                    <th class="text-white">កាលបរិច្ឆេទបញ្ចូល</th>
                </tr>
            </thead>
            <tbody id="meetingBody"></tbody>
        </table>
    </div>
</div>

<div id="page-3" class="page">
    <h1>Page 3</h1>
    <p>This is the content of Page 3.</p>
    <button onclick="goBack()">Go Back</button>
</div>

<script>



let allMeetings = [];

        // Function to convert 24-hour time to 12-hour time with AM/PM
        function formatTimeTo12Hour(time) {
            const [hours, minutes] = time.split(':');
            let hour = parseInt(hours, 10);
            const period = hour >= 12 ? 'PM' : 'AM';

            hour = hour % 12 || 12;
            return `${hour.toString().padStart(2, '0')}:${minutes} ${period}`;
        }

        // Function to format date to mm/dd/yyyy
        function formatDateToMMDDYYYY(dateStr) {
            const date = new Date(dateStr);
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const year = date.getFullYear();
            return `${month}/${day}/${year}`;
        }

        // Function to populate date filter dropdown with unique dates
        function populateDateFilter(meetings) {
            const dateFilter = document.getElementById('dateFilter');
            const uniqueDates = [...new Set(meetings.map(meeting => meeting.date))].sort();
            uniqueDates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = formatDateToMMDDYYYY(date);
                dateFilter.appendChild(option);
            });
        }

        // Fetch data from PHP API
        async function fetchMeetings() {
            try {
                const response = await fetch('get_meetings.php'); // Replace with your API URL
                const result = await response.json();
                if (result.status === 'success') {
                    allMeetings = result.data;
                    populateDateFilter(allMeetings); // Populate date filter
                    displayMeetings(allMeetings);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('meetingTable').style.display = 'table';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                document.getElementById('loading').textContent = 'មានបញ្ហា: ' + error.message;
                document.getElementById('loading').style.color = 'red';
            }
        }

        // Display meetings in table
        function displayMeetings(meetings) {
            const tbody = document.getElementById('meetingBody');
            tbody.innerHTML = '';

            meetings.forEach(meeting => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${meeting.id_number}</td>
                    <td>${meeting.name}</td>
                    <td>${meeting.gender}</td>
                    <td>${formatDateToMMDDYYYY(meeting.date)}</td>
                    <td>${formatTimeTo12Hour(meeting.time)}</td>
                    <td>${meeting.location}</td>
                    <td>${meeting.meeting_type}</td>
                    <td>${meeting.reason || '-'}</td>
                    <td class="${meeting.status === 'attended' ? 'status-attended' : 'status-absent'}">
                        ${meeting.status === 'attended' ? 'ចូលរួម' : 'មិនបានចូលរួម'}
                    </td>
                    <td>${new Date(meeting.created_at).toLocaleString('km-KH')}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Filter meetings based on status, meeting type, search query, and date
        function filterMeetings(status, meetingType, searchQuery, selectedDate) {
            let filteredMeetings = allMeetings;

            // Filter by status
            if (status === 'attended') {
                filteredMeetings = allMeetings.filter(m => m.status === 'attended');
            } else if (status === 'absent') {
                filteredMeetings = allMeetings.filter(m => m.status === 'absent');
            }

            // Filter by meeting type if selected
            if (meetingType) {
                filteredMeetings = filteredMeetings.filter(m => m.meeting_type === meetingType);
            }

            // Filter by search query if provided
            if (searchQuery) {
                searchQuery = searchQuery.toLowerCase();
                filteredMeetings = filteredMeetings.filter(m => 
                    m.name.toLowerCase().includes(searchQuery) || 
                    m.id_number.toLowerCase().includes(searchQuery)
                );
            }

            // Filter by date if selected
            if (selectedDate) {
                filteredMeetings = filteredMeetings.filter(m => m.date === selectedDate);
            }

            // Update active button state
            document.querySelectorAll('.filter-section button').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('btn-' + (btn.dataset.status === status ? btn.dataset.status === 'all' ? 'primary' : btn.dataset.status === 'attended' ? 'success' : 'danger' : 'outline-' + (btn.dataset.status === 'all' ? 'primary' : btn.dataset.status === 'attended' ? 'success' : 'danger')));
            });
            const activeButton = document.querySelector(`.filter-section button[data-status="${status}"]`);
            if (activeButton) {
                activeButton.classList.add('active');
                activeButton.classList.remove('btn-' + (status === 'all' ? 'outline-primary' : status === 'attended' ? 'outline-success' : 'outline-danger'));
                activeButton.classList.add('btn-' + (status === 'all' ? 'primary' : status === 'attended' ? 'success' : 'danger'));
            }

            displayMeetings(filteredMeetings);
        }

        // Add data-status to buttons for tracking
        document.querySelectorAll('.filter-section button').forEach(btn => {
            btn.dataset.status = btn.textContent.includes('ទាំងអស់') ? 'all' : btn.textContent.includes('អ្នកចូលរួម') ? 'attended' : 'absent';
        });

        // Load data on page load
        window.onload = fetchMeetings;



    document.getElementById("form").addEventListener("submit", async function (e) {
            e.preventDefault(); // Prevent the default form submission
            
            // Show loading message
            document.getElementById("message").textContent = "កំពុងបញ្ជូន";
            document.getElementById("message").style.display = "block";
            document.getElementById("submit-button").disabled = true;

            // Collect the form data
            var formData = new FormData(this);
            var keyValuePairs = [];
            for (var pair of formData.entries()) {
                keyValuePairs.push(pair[0] + "=" + pair[1]);
            }
            var formDataString = keyValuePairs.join("&");

            try {
                // Send to Google Apps Script
                const googleResponse = await fetch(
                    "https://script.google.com/macros/s/AKfycbxEGuoYjdmx9Tn5L_JLGjlJB8U2w9ZgatXBqOTIfioU6rj-dc33wQ-VH_PG4NFlZnOj/exec",
                    {
                        redirect: "follow",
                        method: "POST",
                        body: formDataString,
                        headers: {
                            "Content-Type": "text/plain;charset=utf-8",
                        },
                    }
                );

                // Send to SQL Database via PHP API
                const sqlResponse = await fetch(
                    "save_absent_meeting.php", // Replace with your PHP API URL
                    {
                        method: "POST",
                        body: JSON.stringify(Object.fromEntries(formData)),
                        headers: {
                            "Content-Type": "application/json; charset=UTF-8",
                        },
                    }
                );

                // Check responses
                if (!googleResponse.ok) throw new Error("បញ្ហាជាមួយ Google Sheets");
                if (!sqlResponse.ok) {
                    const sqlError = await sqlResponse.json();
                    throw new Error("បញ្ហាជាមួយ SQL database: " + sqlError.message);
                }

                // Display success message
                document.getElementById("message").textContent = "បានបញ្ជូនរួចរាល់ទៅ database ទាំងពីរ";
                document.getElementById("message").style.backgroundColor = "green";
                document.getElementById("message").style.color = "beige";
                document.getElementById("submit-button").disabled = false;
                document.getElementById("form").reset();

                setTimeout(function () {
                    document.getElementById("message").textContent = "";
                    document.getElementById("message").style.display = "none";
                }, 2600);

            } catch (error) {
                // Handle errors
                console.error(error);
                document.getElementById("message").textContent = "មានបញ្ហា: " + error.message;
                document.getElementById("message").style.backgroundColor = "red";
                document.getElementById("message").style.color = "white";
                document.getElementById("submit-button").disabled = false;
            }
        });

        // Function to show a specific page and hide the main page
        function showPage(pageId) {
            document.getElementById('main').style.display = 'none'; // Hide main page
            document.getElementById('page-' + pageId).style.display = 'block'; // Show the selected page
        }

        // Function to go back to the main page
        function goBack() {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.style.display = 'none'); // Hide all pages
            document.getElementById('main').style.display = 'block'; // Show the main page
        }

        // Add event listeners to page links
        document.querySelectorAll('.main-page a').forEach(link => {
            link.addEventListener('click', function (event) {
                event.preventDefault(); // Prevent default link behavior
                const pageId = this.getAttribute('data-page'); // Get the page ID
                showPage(pageId); // Show the selected page
            });
        });

        // Function to sort meetings
        function sortMeetings() {
            const meetingList = document.getElementById('meetingList');
            const meetings = Array.from(meetingList.getElementsByClassName('list-group-item1'));
            const sortBy = document.getElementById('sortBy') ? document.getElementById('sortBy').value : '';

            // Sort meetings based on selected criteria
            if (sortBy === 'date-asc') {
                meetings.sort((a, b) => new Date(a.getAttribute('data-date')) - new Date(b.getAttribute('data-date')));
            } else if (sortBy === 'date-desc') {
                meetings.sort((a, b) => new Date(b.getAttribute('data-date')) - new Date(a.getAttribute('data-date')));
            } else if (sortBy === 'participants-asc') {
                meetings.sort((a, b) => parseInt(a.getAttribute('data-participants')) - parseInt(b.getAttribute('data-participants')));
            } else if (sortBy === 'participants-desc') {
                meetings.sort((a, b) => parseInt(b.getAttribute('data-participants')) - parseInt(a.getAttribute('data-participants')));
            }

            // Clear the current list and append sorted meetings
            meetingList.innerHTML = '';
            meetings.forEach(meeting => meetingList.appendChild(meeting));
        }

        // ScrollReveal animations
        const scrollRevealOption = {
            origin: "bottom",
            distance: "10px",
            duration: 1000,
        };

        ScrollReveal().reveal(".list-group-item1", {
            ...scrollRevealOption,
            origin: "bottom",
            distance: "200px",
        });
</script>

</body>
</html>
