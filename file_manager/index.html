<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ថតនិងកែរូបភាព</title>
  <script src="https://docs.opencv.org/4.5.5/opencv.js" async></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">
  <div class="bg-white p-6 rounded-lg shadow-lg max-w-md w-full text-center">
    <h1 class="text-2xl font-bold mb-4">ថតនិងកែរូបភាពស្វ័យប្រវត្តិ</h1>
    
    <!-- Camera Feed -->
    <video id="video" class="w-full h-64 mb-4 hidden" autoplay></video>
    
    <!-- Error Message -->
    <p id="error" class="text-red-500 mb-4 hidden"></p>
    
    <!-- Canvas for Processing -->
    <canvas id="canvas" class="hidden"></canvas>
    
    <!-- Output Image -->
    <img id="output" class="w-full h-64 mb-4 hidden" alt="រូបភាពបានកែ">
    
    <!-- Buttons and Upload -->
    <div class="flex flex-col space-y-4">
      <button id="capture" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 hidden">ថតរូប</button>
      <input type="file" id="upload" accept="image/*" class="mb-4">
      <button id="process" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 hidden">កែរូបភាព</button>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const output = document.getElementById('output');
    const captureBtn = document.getElementById('capture');
    const uploadInput = document.getElementById('upload');
    const processBtn = document.getElementById('process');
    const errorMsg = document.getElementById('error');
    const ctx = canvas.getContext('2d');

    // Check for MediaDevices support
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      errorMsg.textContent = "កម្មវិធីរុករកនេះមិនគាំទ្រការចូលប្រើកាមេរ៉ាទេ។";
      errorMsg.classList.remove('hidden');
    } else {
      // Access camera
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;
          video.classList.remove('hidden');
          captureBtn.classList.remove('hidden');
        })
        .catch(err => {
          console.error("Error accessing camera:", err);
          let message = "មិនអាចចូលប្រើកាមេរ៉ាបានទេ។";
          if (err.name === "NotAllowedError") {
            message = "សូមអនុញ្ញាតឱ្យចូលប្រើកាមេរ៉ានៅក្នុងការកំណត់របស់កម្មវិធីរុករក។";
          } else if (err.name === "NotFoundError") {
            message = "រកមិនឃើញកាមេរ៉ាទេ�। សូមប្រើមុខងារបញ្ចូលរូបភាព។";
          } else if (window.location.protocol !== "https:" && window.location.hostname !== "localhost") {
            message = "សូមប្រើ HTTPS ឬ localhost ដើម្បីចូលប្រើកាមេរ៉ា។";
          }
          errorMsg.textContent = message;
          errorMsg.classList.remove('hidden');
        });
    }

    // Capture image from video
    captureBtn.addEventListener('click', () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      processBtn.classList.remove('hidden');
      output.classList.add('hidden');
      errorMsg.classList.add('hidden');
    });

    // Handle image upload
    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            processBtn.classList.remove('hidden');
            output.classList.add('hidden');
            errorMsg.classList.add('hidden');
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // Process image (straighten and crop)
    processBtn.addEventListener('click', () => {
      // Wait for OpenCV to load
      if (typeof cv === 'undefined') {
        errorMsg.textContent = "កំពុងផ្ទុក OpenCV សូមរង់ចាំ...";
        errorMsg.classList.remove('hidden');
        return;
      }

      // Get image from canvas
      let src = cv.imread(canvas);

      // Convert to grayscale
      let gray = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

      // Edge detection
      let edges = new cv.Mat();
      cv.Canny(gray, edges, 50, 150);

      // Find lines using Hough Transform
      let lines = new cv.Mat();
      cv.HoughLines(edges, lines, 1, Math.PI / 180, 200);

      // Calculate average angle
      let angle = 0;
      let count = 0;
      for (let i = 0; i < lines.rows; i++) {
        let rho = lines.data32F[i * 2];
        let theta = lines.data32F[i * 2 + 1];
        angle += theta;
        count++;
      }
      angle = count > 0 ? (angle / count) * (180 / Math.PI) - 90 : 0;

      // Rotate image
      let center = new cv.Point(src.cols / 2, src.rows / 2);
      let M = cv.getRotationMatrix2D(center, angle, 1);
      let rotated = new cv.Mat();
      cv.warpAffine(src, rotated, M, new cv.Size(src.cols, src.rows));

      // Convert to grayscale again for cropping
      cv.cvtColor(rotated, gray, cv.COLOR_RGBA2GRAY);

      // Threshold to find contours
      let thresh = new cv.Mat();
      cv.threshold(gray, thresh, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);

      // Find contours
      let contours = new cv.MatVector();
      let hierarchy = new cv.Mat();
      cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      // Find largest rectangle
      let maxArea = 0;
      let maxRect = null;
      for (let i = 0; i < contours.size(); i++) {
        let cnt = contours.get(i);
        let rect = cv.boundingRect(cnt);
        let area = rect.width * rect.height;
        if (area > maxArea) {
          maxArea = area;
          maxRect = rect;
        }
      }

      // Crop image
      let cropped = new cv.Mat();
      if (maxRect) {
        cropped = rotated.roi(maxRect);
      } else {
        cropped = rotated.clone();
      }

      // Display result
      cv.imshow('canvas', cropped);
      output.src = canvas.toDataURL('image/png');
      output.classList.remove('hidden');

      // Clean up
      src.delete();
      gray.delete();
      edges.delete();
      lines.delete();
      rotated.delete();
      thresh.delete();
      contours.delete();
      hierarchy.delete();
      cropped.delete();
      M.delete();
    });
  </script>
</body>
</html>
