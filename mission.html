<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>Form Submission</title>
        
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h2 class="text-center mb-4">បញ្ជាបេសកម្ម</h2>
    <form id="form" class="border p-4 rounded shadow-sm bg-light" method="POST">
        <div class="mb-3">
            <label for="location" class="form-label">1. បញ្ជាបេសកម្មនៅ:</label>
            <input type="text" id="location" name="បញ្ជាបេសកម្មនៅ" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="purpose" class="form-label">2. ដើម្បី:</label>
            <textarea id="purpose" name="ដើម្បី" rows="3" class="form-control" required></textarea>
        </div>
        <div class="mb-3">
            <label for="person1" class="form-label">3. លោក-លោកស្រី:</label>
            <input type="text" id="person1" name="លោក-លោកស្រី" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="role1" class="form-label">4. តូនាទី:</label>
            <input type="text" id="role1" name="តួនាទី" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="person2" class="form-label">5. លោក-លោកស្រី2:</label>
            <input type="text" id="person2" name="លោក-លោកស្រី2" class="form-control">
        </div>
        <div class="mb-3">
            <label for="role2" class="form-label">6. តូនាទី2:</label>
            <input type="text" id="role2" name="តួនាទី2" class="form-control">
        </div>
        <div class="mb-3">
            <label for="startDate" class="form-label">7. កាលបរិច្ឆេទចេញដំណើរ:</label>
            <input type="date" id="startDate" name="កាលបរិច្ឆេទចេញដំណើរ" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="startTime" class="form-label">8. ម៉ោងចេញដំណើរ:</label>
            <input type="time" id="startTime" name="ម៉ោងចេញដំណើរ" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="endDate" class="form-label">9. កាលបរិច្ឆេទត្រឡប់មកវិញ:</label>
            <input type="date" id="endDate" name="កាលបរិច្ឆេទត្រឡប់មកវិញ" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="endTime" class="form-label">10. ម៉ោងត្រឡប់មកវិញ:</label>
            <input type="time" id="endTime" name="ម៉ោងត្រឡប់មកវិញ" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="transport" class="form-label">11. មធ្យបាយធ្វើដំណើរ:</label>
            <input type="text" id="transport" name="មធ្យបាយធ្វើដំណើរ" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="materials" class="form-label">12. សម្ភារៈភ្ជាប់ជាមួយ:</label>
            <textarea id="materials" name="សម្ភារៈភ្ជាប់ជាមួយ" rows="3" class="form-control"></textarea>
        </div>
        <div class="mb-3">
            <label for="datekhmer" class="form-label">13. ថ្ងៃខែឆ្នាំខ្មែរ:</label>
            <textarea id="datekhmer" name="datekhmer" rows="3" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="submit-button">បញ្ជូន</button>
        <div class="mes" id="message"></div>
    </form>
</div>

    <script>
                document.getElementById("form").addEventListener("submit", function (e) {
      e.preventDefault(); // Prevent the default form submission
      document.getElementById("message").textContent = "កំពុងបញ្ជូន";
      document.getElementById("message").style.display = "block";
      document.getElementById("submit-button").disabled = true;

      // Collect the form data
      var formData = new FormData(this);
      var keyValuePairs = [];
      for (var pair of formData.entries()) {
        keyValuePairs.push(pair[0] + "=" + pair[1]);
      }

      var formDataString = keyValuePairs.join("&");

      // Send a POST request to your Google Apps Script
      fetch(
        "https://script.google.com/macros/s/AKfycbybrAfIsZ3a3O0dZlYnvSw6NV99qYOEzUiFPHMMrA2Eanf1cs9VbJ5oF37ZxSc7BweSkg/exec",
        {
          redirect: "follow",
          method: "POST",
          body: formDataString,
          headers: {
            "Content-Type": "text/plain;charset=utf-8",
          },
        }
      )
        .then(function (response) {
          // Check if the request was successful
          if (response) {
            return response; // Assuming your script returns JSON response
          } else {
            throw new Error("មានបញ្ហាមិនអាចបញ្ជូនបានសូមព្យាយាមម្តងទៀត!.");
          }
        })
        .then(function (data) {
          // Display a success message
          document.getElementById("message").textContent =
            "បានបញ្ជូនរួចរាល់";
          document.getElementById("message").style.display = "flex";
          document.getElementById("message").style.backgroundColor = "gold";
          document.getElementById("message").style.color = "beige";
          document.getElementById("submit-button").disabled = false;
          document.getElementById("form").reset();

          setTimeout(function () {
            document.getElementById("message").textContent = "";
            document.getElementById("message").style.display = "none";
          }, 2600);
        })
        .catch(function (error) {
          // Handle errors, you can display an error message here
          console.error(error);
          document.getElementById("message").textContent =
            "An error occurred while submitting the form.";
          document.getElementById("message").style.display = "block";
        });
    });

        document.getElementById('form').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent the default form submission

            const locat = document.getElementById('location').value;
            const pur = document.getElementById('purpose').value;
            const person1 = document.getElementById('person1').value;
            const role1 = document.getElementById('role1').value;
            const person2 = document.getElementById('person2').value;
            const role2 = document.getElementById('role2').value;
            const startDate = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value;
            const endDate = document.getElementById('endDate').value;
            const endTime = document.getElementById('endTime').value;
            const transport = document.getElementById('transport').value;
            const materials = document.getElementById('materials').value;
            const datekhmer = document.getElementById('datekhmer').value;

            // Store data in sessionStorage
            sessionStorage.setItem('location', locat);
            sessionStorage.setItem('purpose', pur);
            sessionStorage.setItem('person1', person1);
            sessionStorage.setItem('role1', role1);
            sessionStorage.setItem('person2', person2);
            sessionStorage.setItem('role2', role2);
            sessionStorage.setItem('startDate', startDate);
            sessionStorage.setItem('startTime', startTime);
            sessionStorage.setItem('endDate', endDate); 
            sessionStorage.setItem('endTime', endTime);
            sessionStorage.setItem('transport', transport);
            sessionStorage.setItem('materials', materials);
            sessionStorage.setItem('datekhmer', datekhmer);

            // Redirect to another page
    setTimeout(function() {
        window.location.href = 'https://app.vvc.asia/missionprint.html';
    }, 7000); // Redirects to the new URL after 7 seconds
});
    </script>
</body>
</html>
