<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for table */
        .table-container {
            max-height: 600px;
            overflow-y: auto;
        }
        th, td {
            text-align: left;
            white-space: nowrap;
        }
        .description-cell {
            max-width: 200px;
            white-space: normal;
            word-wrap: break-word;
        }
        .image-cell {
            max-width: 100px;
        }
        img {
            max-width: 80px;
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Product List</h91>
        <div class="table-container">
            <table class="min-w-full bg-white border border-gray-300 rounded-lg shadow-sm">
                <thead class="bg-gray-200 sticky top-0">
                    <tr>
                        <th class="py-3 px-4 border-b">ID</th>
                        <th class="py-3 px-4 border-b">Name</th>
                        <th class="py-3 px-4 border-b">Price</th>
                        <th class="py-3 px-4 border-b">Category</th>
                        <th class="py-3 px-4 border-b">Stock</th>
                        <th class="py-3 px-4 border-b">Discount</th>
                        <th class="py-3 px-4 border-b">Original Price</th>
                        <th class="py-3 px-4 border-b">Image</th>
                        <th class="py-3 px-4 border-b">Description</th>
                        <th class="py-3 px-4 border-b">Updated At</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <!-- Products will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchProducts() {
            try {
                const response = await fetch('fetch_products.php');
                if (!response.ok) {
                    throw new Error('Failed to fetch products');
                }
                const products = await response.json();
                displayProducts(products);
            } catch (error) {
                console.error('Error fetching products:', error);
                alert('Error fetching products. Please try again later.');
            }
        }

        function displayProducts(products) {
            const tableBody = document.getElementById('productTableBody');
            tableBody.innerHTML = ''; // Clear existing rows

            products.forEach(product => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="py-2 px-4 border-b">${product.id}</td>
                    <td class="py-2 px-4 border-b">${product.name || '-'}</td>
                    <td class="py-2 px-4 border-b">${parseFloat(product.price).toFixed(2)}</td>
                    <td class="py-2 px-4 border-b">${product.category || '-'}</td>
                    <td class="py-2 px-4 border-b">${product.stock || 0}</td>
                    <td class="py-2 px-4 border-b">${parseFloat(product.discount).toFixed(2)}</td>
                    <td class="py-2 px-4 border-b">${product.original_price ? parseFloat(product.original_price).toFixed(2) : '-'}</td>
                    <td class="py-2 px-4 border-b image-cell">
                        ${product.image ? `<img src="data:image/jpeg;base64,${product.image}" alt="Product Image">` : '-'}
                    </td>
                    <td class="py-2 px-4 border-b description-cell">${product.description || '-'}</td>
                    <td class="py-2 px-4 border-b">${new Date(product.updated_at).toLocaleString()}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Fetch products on page load
        window.onload = fetchProducts;
    </script>
</body>
</html>
