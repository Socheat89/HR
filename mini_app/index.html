    <script>
        const partnerSwiper = new Swiper(".partnerSwiper", {
            loop: true,
            slidesPerView: 2,
            spaceBetween: 10,
            autoplay: {
                delay: 4000,
                disableOnInteraction: false,
            },
            pagination: {
                el: ".partner-pagination",
                clickable: true,
            },
            navigation: {
                nextEl: ".partner-next",
                prevEl: ".partner-prev",
            },
            breakpoints: {
                640: {
                    slidesPerView: 4,
                    spaceBetween: 20,
                },
                768: {
                    slidesPerView: 4,
                    spaceBetween: 30,
                },
                1024: {
                    slidesPerView: 4,
                    spaceBetween: 40,
                },
            },
        });

        const searchInputpoduct = document.getElementById("searchInputproduct");
        const priceFilter = document.getElementById("priceFilter");

        searchInputproduct.addEventListener("input", () => {
            filterProducts();
        });

        priceFilter.addEventListener("change", () => {
            filterProducts();
        });

        // Fast filterProducts: avoid DOM access, use global vars, and optimize logic
        function filterProducts(products) {
            if (!Array.isArray(products)) return [];
            let filtered = products;

            // Use global searchQuery and priceFilterValue for speed
            const query = (searchQuery || "").toLowerCase();
            const priceFilter = priceFilterValue || "all";

            if (query) {
            filtered = filtered.filter((product) => {
                const name = (product.name || "").toLowerCase();
                const category = (product.category || "").toLowerCase();
                return name.includes(query) || category.includes(query);
            });
            }

            if (priceFilter !== "all") {
            // Precompute prices for medium filter
            let prices = [];
            if (priceFilter === "medium") {
                prices = filtered
                .map((p) =>
                    p.discount
                    ? p.price * (1 - p.discount / 100)
                    : p.price
                )
                .sort((a, b) => a - b);
                var lowerBound = prices[Math.floor(prices.length * 0.25)] || 0;
                var upperBound = prices[Math.floor(prices.length * 0.75)] || Infinity;
            }

            filtered = filtered.filter((product) => {
                const price = product.discount
                ? product.price * (1 - product.discount / 100)
                : product.price;
                if (priceFilter === "low") return price <= 10;
                if (priceFilter === "medium") return price >= lowerBound && price <= upperBound;
                if (priceFilter === "high") return price >= 50;
                return true;
            });

            // For low/high, sort as well
            if (priceFilter === "low") {
                filtered = filtered.sort((a, b) => {
                const priceA = a.discount ? a.price * (1 - a.discount / 100) : a.price;
                const priceB = b.discount ? b.price * (1 - b.discount / 100) : b.price;
                return priceA - priceB;
                });
            } else if (priceFilter === "high") {
                filtered = filtered.sort((a, b) => {
                const priceA = a.discount ? a.price * (1 - a.discount / 100) : a.price;
                const priceB = b.discount ? b.price * (1 - b.discount / 100) : b.price;
                return priceB - priceA;
                });
            }
            }

            return filtered;
        }

        function initializeFilters() {
            const searchInput = document.getElementById("searchInputproduct");
            const priceFilter = document.getElementById("priceFilter");

            if (!searchInput || !priceFilter) {
                console.error("Search input or price filter element not found!");
                return;
            }

            // Use a single event handler for both filters to minimize re-renders
            const handleFilterChange = () => {
                searchQuery = searchInput.value.trim();
                priceFilterValue = priceFilter.value;
                displayProducts();
            };

            // Remove previous listeners if any
            searchInput.oninput = null;
            priceFilter.onchange = null;

            // Debounce search input for performance
            let debounceTimeout;
            searchInput.addEventListener("input", () => {
                clearTimeout(debounceTimeout);
                debounceTimeout = setTimeout(handleFilterChange, 200);
            });

            priceFilter.addEventListener("change", handleFilterChange);
        }
    </script>

    <script>
        document
            .getElementById("getCurrentLocation")
            .addEventListener("click", () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const { latitude, longitude } = position.coords;
                            const mapIframe = document.getElementById("mapIframe");
                            const mapLinkInput = document.getElementById("mapLink");
                            const addressInput = document.getElementById("shippingAddress");
                            // Use Google Maps for mapLink
                            const mapUrl = `https://www.google.com/maps?q=${latitude},${longitude}`;
                            mapIframe.src = `https://www.openstreetmap.org/export/embed.html?bbox=${longitude}%2C${latitude}%2C${longitude}%2C${latitude}&layer=mapnik`;
                            mapLinkInput.value = mapUrl;

                            try {
                                const response = await fetch(
                                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=km`
                                );
                                const data = await response.json();
                                if (data && data.display_name) {
                                    addressInput.value = data.display_name;
                                } else {
                                    alert("មិនអាចទាញយកអាសយដ្ឋានបាន។");
                                }
                            } catch (error) {
                                alert("កំហុសក្នុងការទាញយកអាសយដ្ឋាន: " + error.message);
                            }
                        },
                        (error) => {
                            alert("មិនអាចទទួលបានទីតាំងបច្ចុប្បន្ន: " + error.message);
                        }
                    );
                } else {
                    alert(
                        "កម្មវិធីរុករករបស់អ្នកមិនគាំទ្រការប្រើប្រាស់ geolocation ទេ។"
                    );
                }
            });

        // Validate and collect shipping info
        async function validateAndSubmitShippingInfo(orderId) {

            const shippingAddress = document
                .getElementById("shippingAddress")
                .value.trim();
            const shippingPhone = document
                .getElementById("shippingPhone")

            const mapIframeSrc = document.getElementById("mapIframe").src;
            const latitudeMatch = mapIframeSrc.match(/mlat=([\d\.-]+)/);
            const longitudeMatch = mapIframeSrc.match(/mlon=([\d\.-]+)/);
            const latitude = latitudeMatch ? parseFloat(latitudeMatch[1]) : null;
            const longitude = longitudeMatch ? parseFloat(longitudeMatch[1]) : null;

            // Validation
            if (!shippingName) {
                Telegram.WebApp.showAlert("សូមបញ្ចូលឈ្មោះ!");
                return false;
            }
            if (!/^[A-Za-z\s\u1780-\u17FF]+$/.test(shippingName)) {
                Telegram.WebApp.showAlert("ឈ្មោះគួរមានតែអក្សរខ្មែរ ឬឡាតាំង!");
                return false;
            }
            if (!shippingAddress) {
                Telegram.WebApp.showAlert("សូមបញ្ចូលអាសយដ្ឋាន!");
                return false;
            }
            if (!shippingPhone) {
                Telegram.WebApp.showAlert("សូមបញ្ចូលលេខទូរស័ព្ទ!");
                return false;
            }
            if (!/^0[1-9][0-9]{7,8}$/.test(shippingPhone)) {
                Telegram.WebApp.showAlert(
                    "លេខទូរស័ព្ទមិនត្រឹមត្រូវ! (ឧទាហរណ៍: 012345678)"
                );
                return false;
            }

            try {
                const response = await fetch(
                    `${API_URL}?action=submit_shipping_info`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded",
                            "X-Telegram-Init-Data": window.Telegram.WebApp.initData,
                        },
                        body: new URLSearchParams({
                            telegram_id: user.id,
                            order_id: orderId,
                            name: shippingName,
                            phone: shippingPhone,
                            address: shippingAddress,
                            latitude: latitude || "",
                            longitude: longitude || "",
                        }),
                    }
                );
                const result = await response.json();
                if (result.error) {
                    Telegram.WebApp.showAlert(result.error);
                    return false;
                }
                showToast("ព័ត៌មានដឹកជញ្ជូនត្រូវបានរក្សាទុក!");
                return true;
            } catch (error) {
                Telegram.WebApp.showAlert("កំហុសបណ្តាញ! សូមព្យាយាមម្តងទៀត។");
                return false;

        // Convert 24-hour format to 12-hour format with AM/PM
        function formatTo12Hour(timestamp) {
            const [datePart, timePart] = timestamp.split(" ");
            const [day, month, year] = datePart.split("/");
            const [hours, minutes, seconds] = timePart.split(":");
            let hourNum = parseInt(hours, 10);
            const period = hourNum >= 12 ? "PM" : "AM";
            hourNum = hourNum % 12 || 12;
            return `${day}/${month}/${year} ${hourNum
                .toString()
                .padStart(2, "0")}:${minutes}:${seconds} ${period}`;

        // Fast submitRating: update UI instantly, then sync with server in background
        async function submitRating(productId, rating) {
            if (!user) {
                Telegram.WebApp.showAlert("សូមចូលគណនីជាមុន!");
                return;
            }
            if (rating < 1 || rating > 5) {
                Telegram.WebApp.showAlert("ការវាយតម្លៃមិនត្រឹមត្រូវ!");
                return;
            }

            // Update UI instantly (optimistic)
            updateProductRatingUI(productId, rating, "...", rating);

            // Sync with server in background
            try {
                const stars = document.querySelectorAll(
                    `#product-${productId} .rating-star`
                );
                stars.forEach((star) => (star.style.pointerEvents = "none"));

                // Check if user has rated
                const checkResponse = await fetch(
                    `${API_URL}?action=check_user_rating&telegram_id=${encodeURIComponent(
                        user.id
                    )}&product_id=${encodeURIComponent(productId)}`,
                    {
                        headers: {
                            "X-Telegram-Init-Data": window.Telegram.WebApp.initData,
                        },
                    }
                );
                const checkResult = await checkResponse.json();
                if (checkResult.error) {
                    Telegram.WebApp.showAlert(checkResult.error);
                    return;
                }

                let newAverageRating = null;
                let newRatingCount = null;

                if (checkResult.has_rated) {
                    // Delete rating
                    const deleteResponse = await fetch(
                        `${API_URL}?action=delete_product_rating`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/x-www-form-urlencoded",
                                "X-Telegram-Init-Data": window.Telegram.WebApp.initData,
                            },
                            body: new URLSearchParams({
                                telegram_id: user.id,
                                product_id: productId,
                            }),
                        }
                    );
                    const deleteResult = await deleteResponse.json();
                    if (deleteResult.error) {
                        Telegram.WebApp.showAlert(deleteResult.error);
                        return;
                    }
                    showToast("ការវាយតម្លៃបានលុបជោគជ័យ!");
                    newAverageRating = deleteResult.average_rating || 0;
                    newRatingCount = deleteResult.rating_count || 0;
                } else {
                    // Submit new rating
                    const submitResponse = await fetch(
                        `${API_URL}?action=submit_product_rating`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/x-www-form-urlencoded",
                                "X-Telegram-Init-Data": window.Telegram.WebApp.initData,
                            },
                            body: new URLSearchParams({
                                telegram_id: user.id,
                                product_id: productId,
                                rating: rating,
                                first_name: encodeURIComponent(fullName),
                            }),
                        }
                    );
                    const submitResult = await submitResponse.json();
                    if (submitResult.error) {
                        Telegram.WebApp.showAlert(submitResult.error);
                        return;
                    }
                    showToast("ការវាយតម្លៃបានជោគជ័យ!");
                    newAverageRating = submitResult.average_rating || 0;
                    newRatingCount = submitResult.rating_count || 0;
                }

                // Fallback: Fetch ratings if not provided
                if (!newAverageRating || !newRatingCount) {
                    const ratingResponse = await fetch(
                        `${API_URL}?action=get_product_ratings&product_ids=${encodeURIComponent(
                            productId
                        )}`,
                        {
                            headers: {
                                "X-Telegram-Init-Data": window.Telegram.WebApp.initData,
                            },
                        }
                    );
                    const ratings = await ratingResponse.json();
                    newAverageRating = ratings[productId]?.average_rating || 0;
                    newRatingCount = ratings[productId]?.rating_count || 0;
                }

                // Update cachedProducts
                cachedProducts = cachedProducts.map((product) =>
                    product.id === productId
                        ? {
                            ...product,
                            average_rating: newAverageRating,
                            rating_count: newRatingCount,
                            user_rating: checkResult.has_rated ? 0 : rating,
                        }
                        : product
                );

                // Update UI
                updateProductRatingUI(
                    productId,
                    newAverageRating,
                    newRatingCount,
                    checkResult.has_rated ? 0 : rating
                );
            } catch (error) {
                console.error("Rating submission error:", error);
                Telegram.WebApp.showAlert("កំហុសបណ្តាញ! សូមព្យាយាមម្តងទៀត។");

                    `#product-${productId} .rating-star`
                );
                stars.forEach((star) => (star.style.pointerEvents = "auto"));
            }
        }

                const cartItem = cachedCart.find(
                    (item) => parseInt(item.id) === parseInt(cartId)

                if (cartItem) {
                    const product = (cachedProducts || []).find(
                        (p) => parseInt(p.id) === parseInt(cartItem.product_id)

        // Image Zoom Functionality
        let currentScale = 1;
        const minScale = 1;
        const maxScale = 4;
        let startDistance = 0;
        let startScale = 1;

        function showImageZoom(imageUrl, altText) {
            const modal = document.getElementById("imageZoomModal");
            const zoomedImage = document.getElementById("zoomedImage");
            zoomedImage.src = imageUrl;
            zoomedImage.alt = altText;
            currentScale = 1;
            zoomedImage.style.transform = `scale(${currentScale})`;
            modal.style.display = "flex";
        }

        document
            .getElementById("imageZoomClose")
            .addEventListener("click", () => {
                document.getElementById("imageZoomModal").style.display = "none";
            });

        document.getElementById("zoomIn").addEventListener("click", () => {
            currentScale = Math.min(currentScale + 0.5, maxScale);
            document.getElementById(
                "zoomedImage"
            ).style.transform = `scale(${currentScale})`;
        });

        document.getElementById("zoomOut").addEventListener("click", () => {
            currentScale = Math.max(currentScale - 0.5, minScale);
            document.getElementById(
                "zoomedImage"
            ).style.transform = `scale(${currentScale})`;
        });

        document.getElementById("zoomReset").addEventListener("click", () => {
            currentScale = 1;
            document.getElementById(
                "zoomedImage"
            ).style.transform = `scale(${currentScale})`;
        });

        const imageContainer = document.querySelector(".image-zoom-container");
        imageContainer.addEventListener("touchstart", (e) => {
            if (e.touches.length === 2) {
                startDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                startScale = currentScale;
            }
        });

        imageContainer.addEventListener("touchmove", (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const currentDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                currentScale = Math.max(
                    minScale,
                    Math.min(maxScale, startScale * (currentDistance / startDistance))
                );
                document.getElementById(
                    "zoomedImage"
                ).style.transform = `scale(${currentScale})`;
            }
        });

        imageContainer.addEventListener("wheel", (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            currentScale = Math.max(
                minScale,
                Math.min(maxScale, currentScale + delta)
            );
            document.getElementById(
                "zoomedImage"
            ).style.transform = `scale(${currentScale})`;
        });

        document.addEventListener("keydown", (e) => {
            if (
                e.key === "Escape" &&
                document.getElementById("imageZoomModal").style.display === "flex"
            ) {
                document.getElementById("imageZoomModal").style.display = "none";
            }
        });

        // Update cart quantity

        async function updateCartQuantity(cartId, change) {
            if (!user) {
                Telegram.WebApp.showAlert("សូមចូលគណនីជាមុន!");
                return;

            const scrollPosition = window.scrollY;

            // Update UI instantly
            let cartItem = cachedCart.find(
                (item) => parseInt(item.id) === parseInt(cartId)
            );
            if (cartItem) {
                cartItem.quantity = Math.max(1, (cartItem.quantity || 1) + change);
                if (cartItem.quantity === 0) {
                    cachedCart = cachedCart.filter(
                        (item) => parseInt(item.id) !== parseInt(cartId)
                    );
                }
            }
            updateCartBadge(cachedCart);
            updateProductBadges();
            displayCart();

            // Sync with server in background
            try {
                const response = await fetch(
                    `${API_URL}?action=update_cart_quantity`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: `telegram_id=${encodeURIComponent(
                            user.id
                        )}&cart_id=${cartId}&quantity_change=${change}&first_name=${encodeURIComponent(
                            fullName
                        )}`,
                    }
                );
                const result = await response.json();
                if (result.error) {
                    Telegram.WebApp.showAlert(result.error);
                    // Rollback UI if error
                    displayCart();
                    updateProductBadges();
                    return;
                }
                // Update cached cart from server

                    `${API_URL}?action=get_cart&telegram_id=${encodeURIComponent(
                        user.id
                    )}&first_name=${encodeURIComponent(fullName)}`

        // Fast update of product badges using a map for O(1) lookup
        // Do NOT auto-hide sidebar after update
        function updateProductBadges() {
            // Build a map for quick lookup
            const cartMap = new Map();
            cachedCart.forEach((item) => {
                cartMap.set(parseInt(item.product_id), item.quantity || 0);
            });

            document.querySelectorAll(".product-card").forEach((card) => {
                const button = card.querySelector(".add-to-cart-btn");
                if (!button) return;
                const match = button.getAttribute("onclick")?.match(/\d+/);
                if (!match) return;
                const productId = parseInt(match[0]);
                const quantity = cartMap.get(productId) || 0;
                const badge = button.querySelector(".cart-add-badge");
                if (badge) {
                    badge.textContent = quantity;
                    // badge.classList.toggle("hidden", quantity === 0); // Do not hide badge
                }
            });
            // Do not hide sidebar here
            // (No sidebar.classList.remove('open') here)
        }

        let lastPoints = null;
        let lastPointsFetchTime = 0;
        async function loadPoints(force = false) {
            if (!user) return;
            const now = Date.now();
            // Cache for 30 seconds unless forced
            if (!force && lastPoints !== null && now - lastPointsFetchTime < 30000) {
            const pointsElem = document.getElementById("points");
            if (pointsElem) pointsElem.textContent = lastPoints;
            return;
            }
            try {
            const response = await fetch(
                `${API_URL}?action=get_points&telegram_id=${encodeURIComponent(user.id)}&first_name=${encodeURIComponent(fullName)}`
            );
            const result = await response.json();
            if (result && !result.error) {
                lastPoints = result.points;
                lastPointsFetchTime = now;
                const pointsElem = document.getElementById("points");
                if (pointsElem) pointsElem.textContent = result.points;
            } else if (result && result.error) {
                showToast(result.error);
            }
            } catch {
            showToast("កំហុសបណ្តាញ!");
            }
        }

                }); sidebar.classList.remove('open');" class="telegram-button bg-teal-500 text-white px-4 py-2 rounded-lg hover:bg-teal-600 transition-colors duration-300">
                    <i class="fas fa-eye"></i> មើល
                    </button>
                </div>
                `;
                fragment.appendChild(orderDiv);
            }
            historyContent.innerHTML = "";
            historyContent.appendChild(fragment);
            }
        }

        // Show order details in modal
        function showOrderDetails(orderId) {
            // Use cachedOrders map for O(1) lookup if available
            let order = cachedOrders.find?.((o) => o.id === orderId);
            if (!order) {
            showToast("រកមិនឃើញការបញ្ជាទិញ!");
            return;
            }

            const modal = document.createElement("div");
            modal.className = "modal";
            // Use Array.map + join for faster HTML generation
            let itemsHtml = (order.items || []).map(item => `
            <div class="flex items-center space-x-2 p-2 bg-gray-50 rounded-md">
                <div class="flex-1">
                <p class="font-semibold">${htmlspecialchars(item.product_name)}</p>
                <p class="text-gray-600">$${parseFloat(item.price).toFixed(2)} x ${item.quantity}</p>
                </div>
            </div>
            `).join("");

            const formattedCreatedAt = formatTo12Hour(order.created_at);
            modal.innerHTML = `
        <div class="modal-content bg-white rounded-lg shadow-lg p-6 max-w-lg mx-auto">
            <h2 class="text-center text-2xl font-bold text-gray-800 mb-4">ការបញ្ជាទិញ #${order.id
                }</h2>
            <p class="text-sm text-gray-600 mb-4 text-center">${formattedCreatedAt}</p>
            <div class="space-y-4 mb-6 bg-gray-50 p-4 rounded-lg shadow-inner">${itemsHtml}</div>
            <p class="text-lg font-semibold text-gray-800 mb-2">ទឹកប្រាក់សរុប: <span class="text-green-600">$${parseFloat(
                    order.total
                ).toFixed(2)}</span></p>
            <p class="text-lg font-semibold text-teal-600 mb-4">ពិន្ទុទទួលបាន: <span class="text-blue-500">${order.points_earned
                }</span></p>
            <div class="flex justify-end space-x-4">
                <button onclick="downloadReceipt(${order.id
                })" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600 transition-colors duration-300">
                    <i class="fas fa-download"></i> ទាញ PDF
                </button>
                <button class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600 transition-colors duration-300" onclick="this.closest('.modal').remove()">
                    <i class="fas fa-times"></i> បិទ
                </button>
            </div>
        </div>
    `;
            document.body.appendChild(modal);
            modal.style.display = "flex";
        }

        // Download receipt as PDF
        async function downloadReceipt(orderId) {
            try {
                if (!window.jspdf || !window.jspdf.jsPDF) {
                    throw new Error("jsPDF library is not loaded.");
                }

                const order = cachedOrders.find((o) => o.id === orderId);
                if (!order) {
                    showToast("រកមិនឃើញការបញ្ជាទិញ!");
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: "portrait",
                    unit: "mm",
                    format: "a5",
                });

                const notoSansKhmerBase64 =
                    "/* Replace with actual Base64 string of NotoSansKhmer-Regular.ttf */";
                if (
                    notoSansKhmerBase64 &&
                    notoSansKhmerBase64 !==
                    "/* Replace with actual Base64 string of NotoSansKhmer-Regular.ttf */"
                ) {
                    try {
                        doc.addFileToVFS(
                            "NotoSansKhmer-Regular.ttf",
                            notoSansKhmerBase64
                        );
                        doc.addFont(
                            "NotoSansKhmer-Regular.ttf",
                            "NotoSansKhmer",
                            "normal"
                        );
                        doc.setFont("NotoSansKhmer");
                    } catch (fontError) {
                        console.error("Failed to load Khmer font:", fontError);
                        showToast("មិនអាចផ្ទុកអក្សរខ្មែរ! ប្រើអក្សរលំនាំដើម។");
                        doc.setFont("Helvetica");
                    }
                } else {
                    console.warn(
                        "Khmer font Base64 string not provided. Falling back to Helvetica."
                    );
                    doc.setFont("Helvetica");
                    showToast("មិនមានអក្សរខ្មែរ! ប្រើអក្សរលំនាំដើម។");
                }

                const pageWidth = doc.internal.pageSize.getWidth();
                const marginLeft = 10;
                const marginRight = 10;
                const marginTop = 10;
                let yPosition = marginTop;

                const addText = (text, x, y, options = {}) => {
                    const maxWidth =
                        options.maxWidth || pageWidth - marginLeft - marginRight;
                    const align = options.align || "left";
                    doc.text(text, x, y, { maxWidth, align });
                    const textHeight = doc.getTextDimensions(text, { maxWidth }).h;
                    return y + textHeight + (options.lineSpacing || 2);
                };

                const drawLine = (y) => {
                    doc.setLineWidth(0.5);
                    doc.line(marginLeft, y, pageWidth - marginRight, y);
                    return y + 5;
                };

                doc.setFontSize(16);
                yPosition = addText("Online Store", pageWidth / 2, yPosition, {
                    align: "center",
                });
                yPosition = drawLine(yPosition);

                doc.setFontSize(12);
                yPosition = addText(`Order #${order.id}`, marginLeft, yPosition);
                const formattedCreatedAt = formatTo12Hour(order.created_at);
                yPosition = addText(
                    `Date: ${formattedCreatedAt}`,
                    marginLeft,
                    yPosition
                );
                yPosition = addText(`Customer: ${fullName}`, marginLeft, yPosition);
                yPosition += 5;

                doc.setFontSize(10);
                yPosition = addText("Product", marginLeft, yPosition);
                doc.text("Qty", marginLeft + 40, yPosition - 5);
                doc.text("Price", marginLeft + 70, yPosition - 5);
                doc.text("Total", marginLeft + 100, yPosition - 5);
                yPosition = drawLine(yPosition);

                order.items.forEach((item) => {
                    const itemName = htmlspecialchars(item.product_name).substring(
                        0,
                        20
                    );
                    const quantity = item.quantity.toString();
                    const price = parseFloat(item.price).toFixed(2);
                    const total = (parseFloat(item.price) * item.quantity).toFixed(2);

                    yPosition = addText(itemName, marginLeft, yPosition);
                    doc.text(quantity, marginLeft + 40, yPosition - 5);
                    doc.text(`$${price}`, marginLeft + 70, yPosition - 5);
                    doc.text(`$${total}`, marginLeft + 100, yPosition - 5);

                    if (yPosition > 190) {
                        doc.addPage();
                        yPosition = marginTop;
                        doc.setFontSize(10);
                        yPosition = addText("Product", marginLeft, yPosition);
                        doc.text("Qty", marginLeft + 40, yPosition - 5);
                        doc.text("Price", marginLeft + 70, yPosition - 5);
                        doc.text("Total", marginLeft + 100, yPosition - 5);
                        yPosition = drawLine(yPosition);
                    }
                });

                yPosition = drawLine(yPosition);
                doc.setFontSize(12);
                yPosition = addText(
                    `Total Amount: $${parseFloat(order.total).toFixed(2)}`,
                    marginLeft,
                    yPosition
                );
                yPosition = addText(
                    `Points Earned: ${order.points_earned}`,
                    marginLeft,
                    yPosition
                );
                yPosition += 5;

                doc.setFontSize(10);
                yPosition = addText(
                    "Thank you for your purchase!",
                    pageWidth / 2,
                    yPosition,
                    { align: "center" }
                );

                doc.save(`receipt_${order.id}.pdf`);
                showToast("បានទាញ PDF ជោគជ័យ!");
            } catch (error) {
                console.error("Error generating PDF:", error);
                showToast("មិនអាចទាញ PDF បាន! សូមព្យាយាមម្តងទៀត។");
                Telegram.WebApp.showAlert(`កំហុស: ${error.message}`);
            }
        }

        // Display reward redemption history
        async function displayRewardRedemptions() {
            if (!user) {
                showToast("សូមចូលគណនីជាមុន!");
                return;
            }

            const rewardsHistoryContent = document.getElementById(
                "rewardsHistoryContent"
            );
            rewardsHistoryContent.innerHTML =
                '<div class="text-center">កំពុងផ្ទុក...</div>';

            try {
                const response = await fetch(
                    `${API_URL}?action=get_reward_redemptions&telegram_id=${encodeURIComponent(
                        user.id
                    )}`
                );
                cachedRewardRedemptions = await response.json();
                rewardsHistoryContent.innerHTML = "";

                if (cachedRewardRedemptions.error) {
                    showToast(cachedRewardRedemptions.error);
                    return;
                }

                if (cachedRewardRedemptions.length === 0) {
                    rewardsHistoryContent.innerHTML =
                        '<div class="text-center text-gray-500">គ្មានប្រវត្តិប្តូររង្វាន់</div>';
                    return;
                }

                cachedRewardRedemptions.forEach((redemption) => {
                    const redemptionDiv = document.createElement("div");
                    redemptionDiv.className = "redemption-item";
                    const formattedRedeemedAt = formatTo12Hour(redemption.redeemed_at);
                    redemptionDiv.innerHTML = `
                <div class="redemption-details">
                    <span class="reward-name">${htmlspecialchars(
                        redemption.reward_name
                    )}</span>
                    <p class="reward-points">ពិន្ទុប្រើ: ${redemption.points_required
                        }</p>
                    <p class="redeemed-at">ប្តូរនៅ: ${formattedRedeemedAt}</p>
                </div>
            `;
                    rewardsHistoryContent.appendChild(redemptionDiv);
                });
            } catch (error) {
                rewardsHistoryContent.innerHTML = "";
                showToast("កំហុសបណ្តាញ!");
            }
        }

        // Fetch rewards
        async function fetchRewards() {
            console.log("Fetching rewards");
            try {
                const response = await fetch(`${API_URL}?action=get_rewards`);
                const rewards = await response.json();
                if (rewards.error) {
                    showToast(rewards.error);
                    return [];
                }
                console.log("Rewards fetched:", rewards);
                return rewards;
            } catch (error) {
                console.error("Fetch rewards error:", error);
                showToast("កំហុសបណ្តាញ!");
                return [];
            }
        }

        // Show rewards modal
        async function showRewardsModal() {
            console.log("Showing rewards modal");
            if (!user) {
                Telegram.WebApp.showAlert("សូមចូលគណនីជាមុន!");
                return;
            }
            const currentPoints =
                parseInt(document.getElementById("points").textContent) || 0;
            if (currentPoints < 50) {
                Telegram.WebApp.showAlert("ពិន្ទុមិនគ្រប់គ្រាន់!");
                return;
            }
            const modal = document.getElementById("rewardsModal");
            const rewardsList = document.getElementById("rewardsList");
            rewardsList.innerHTML = '<div class="text-center">កំពុងផ្ទុក...</div>';

            try {
                const rewards = await fetchRewards();
                rewardsList.innerHTML = "";
                if (rewards.length === 0) {
                    rewardsList.innerHTML =
                        '<div class="text-center text-gray-500">គ្មានរង្វាន់</div>';
                    modal.style.display = "none";
                    return;
                }
                rewards.forEach((reward) => {
                    const rewardItem = document.createElement("div");
                    rewardItem.className = "reward-item";
                    const imageUrl = reward.image
                        ? htmlspecialchars(reward.image)
                        : "https://via.placeholder.com/48";
                    const isDisabled = currentPoints < reward.points_required;
                    rewardItem.innerHTML = `
                <img src="${imageUrl}" alt="${htmlspecialchars(
                        reward.name
                    )}" class="product-img w-48 h-48 object-contain rounded-lg shadow-md hover:shadow-lg transition-shadow duration-300">
                <div class="reward-info">
                    <span class="reward-name">${htmlspecialchars(
                        reward.name
                    )}</span>
                    <p class="reward-points">ពិន្ទុចាំបាច់: ${reward.points_required
                        }</p>
                </div>
                <button ${isDisabled ? "disabled" : ""} onclick="redeemReward(${reward.id
                        })">
                    <i class="fas fa-gift"></i> ប្តូរ
                </button>
            `;
                    rewardsList.appendChild(rewardItem);
                });
                modal.style.display = "flex";
            } catch (error) {
                console.error("Show rewards modal error:", error);
                rewardsList.innerHTML = "";
                showToast("កំហុសបណ្តាញ!");
                modal.style.display = "none";
            }
        }

        // Redeem reward
        async function redeemReward(rewardId) {
            console.log("Redeeming reward:", rewardId);
            if (!user) {
                Telegram.WebApp.showAlert("សូមចូលគណនីជាមុន!");
                return;
            }
            try {
                const response = await fetch(`${API_URL}?action=redeem_reward`, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `telegram_id=${encodeURIComponent(
                        user.id
                    )}&reward_id=${rewardId}&first_name=${encodeURIComponent(
                        fullName
                    )}`,
                });
                const result = await response.json();
                if (result.error) {
                    Telegram.WebApp.showAlert(result.error);
                    return;
                }
                document.getElementById("points").textContent = result.points;
                showToast(`បានប្តូររង្វាន់ជោគជ័យ! ប្តូរនៅ: ${result.redeemed_at}`);
                document.getElementById("rewardsModal").style.display = "none";
                displayRewardRedemptions();
            } catch (error) {
                console.error("Redeem reward error:", error);
                Telegram.WebApp.showAlert("កំហុសបណ្តាញ!");
            }
        }

        // Sidebar toggle
        const sidebar = document.getElementById("sidebar");
        const sidebarToggle = document.getElementById("sidebarToggle");
        const sidebarClose = document.getElementById("sidebarClose");
        const cartTab = document.getElementById("cartTab");
        const historyTab = document.getElementById("historyTab");
        const rewardsHistoryTab = document.getElementById("rewardsHistoryTab");
        const cartContent = document.getElementById("cartContent");
        const historyContent = document.getElementById("historyContent");
        const rewardsHistoryContent = document.getElementById(
            "rewardsHistoryContent"
        );

        sidebarToggle.addEventListener("click", () => {
            sidebar.classList.toggle("open");
        });

        sidebarClose.addEventListener("click", () => {
            sidebar.classList.remove("open");
        });

        cartTab.addEventListener("click", () => {
            cartTab.classList.add("active");
            historyTab.classList.remove("active");
            rewardsHistoryTab.classList.remove("active");
            cartContent.classList.remove("hidden");
            historyContent.classList.add("hidden");
            rewardsHistoryContent.classList.add("hidden");
            searchInput.classList.add("hidden");
            displayCart();
        });

        historyTab.addEventListener("click", () => {
            historyTab.classList.add("active");
            cartTab.classList.remove("active");
            rewardsHistoryTab.classList.remove("active");
            historyContent.classList.remove("hidden");
            cartContent.classList.add("hidden");
            rewardsHistoryContent.classList.add("hidden");
            searchInput.classList.remove("hidden");
            displayOrderHistory();
        });

        // Add search input for historyTab
        // Fast search input for order history (searches only visible DOM nodes)
        const searchInput = document.createElement("input");
        searchInput.type = "text";
        searchInput.placeholder = "ស្វែងរកតាមថ្ងៃខែឆ្នាំ...";
        searchInput.className =
            "w-full p-2 mb-4 border border-gray-300 rounded-lg hidden";
        let lastSearch = "";
        searchInput.addEventListener("input", () => {
            const query = searchInput.value.trim().toLowerCase();
            if (query === lastSearch) return;
            lastSearch = query;
            const orders = Array.from(historyContent.children);
            for (let i = 0; i < orders.length; i++) {
            const dateText =
                orders[i]
                .querySelector(".text-sm.text-gray-600")
                ?.textContent.toLowerCase() || "";
            orders[i].style.display = dateText.includes(query) ? "block" : "none";
            }
        });

        historyContent.parentElement.insertBefore(searchInput, historyContent);

        rewardsHistoryTab.addEventListener("click", () => {
            rewardsHistoryTab.classList.add("active");
            cartTab.classList.remove("active");
            historyTab.classList.remove("active");
            rewardsHistoryContent.classList.remove("hidden");
            cartContent.classList.add("hidden");
            historyContent.classList.add("hidden");
            searchInput.classList.add("hidden");
            displayRewardRedemptions();
        });

        // Event Listeners for Footer Buttons
        document
            .getElementById("checkoutButton")
            .addEventListener("click", showCheckoutModal);
        document
            .getElementById("cancelCheckout")
            .addEventListener("click", () => {
                document.getElementById("checkoutModal").style.display = "none";
            });
        document
            .getElementById("confirmCheckout")
            .addEventListener("click", confirmCheckout);
        document
            .getElementById("redeemButton")
            .addEventListener("click", showRewardsModal);
        document
            .getElementById("closeRewardsModal")
            .addEventListener("click", () => {
                document.getElementById("rewardsModal").style.display = "none";
            });

        // Scroll to Top Functionality
        const scrollToTopBtn = document.getElementById("scrollToTop");
        let scrollTimeout;

        window.addEventListener("scroll", () => {
            if (window.scrollY > 100) {
                scrollToTopBtn.classList.add("visible");
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    scrollToTopBtn.classList.remove("visible");
                }, 200);
            } else {
                scrollToTopBtn.classList.remove("visible");
            }
        });

        scrollToTopBtn.addEventListener("click", () => {
            window.scrollTo({
                top: 0,
                behavior: "smooth",
            });
        });

        // Initialize
        async function initialize() {
            await fetchPointsConfig();
            await displayCategories();
            initializeFilters();
            displayProducts();
            loadPoints();
            displayCart();
        }
        initialize();
    </script>
