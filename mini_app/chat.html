<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chatArea {
            height: 70vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .user-message {
            background-color: #DCF8C6;
            align-self: flex-end;
        }
        .bot-message {
            background-color: #E5E7EB;
            align-self: flex-start;
        }
        .error-message {
            background-color: #FECACA;
            align-self: flex-start;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">
    <div class="bg-blue-600 text-white p-4 text-center">
        <h1 class="text-xl font-bold">Mini-Shop Telegram Bot Chat</h1>
    </div>
    <div id="chatArea" class="flex-1 p-4 flex flex-col gap-2">
        <div class="bot-message max-w-xs p-3 rounded-lg text-sm">
            Welcome! Type a message to start chatting with the Mini-Shop Bot. Try "/start" to begin!
        </div>
    </div>
    <div class="p-4 bg-white border-t border-gray-200 flex gap-2">
        <input
            id="messageInput"
            type="text"
            placeholder="Type your message..."
            class="flex-1 p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
            id="sendButton"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 disabled:bg-gray-400"
            onclick="sendMessage()"
        >
            Send
        </button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        let lastMessageId = 0;

        // Function to append a message
        function appendMessage(text, type = 'bot') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `max-w-xs p-3 rounded-lg text-sm ${
                type === 'user' ? 'user-message' : type === 'error' ? 'error-message' : 'bot-message'
            }`;
            messageDiv.textContent = text;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Function to send a message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            messageInput.disabled = true;
            sendButton.disabled = true;

            appendMessage(message, 'user');
            messageInput.value = '';

            try {
                const response = await fetch('send_message.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, chat_id: 'web_user_123' })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                if (data.ok) {
                    appendMessage(data.message, 'bot');
                } else {
                    appendMessage('Error: ' + data.error, 'error');
                }
            } catch (error) {
                console.error('Send message error:', error);
                appendMessage('Failed to send message. Please try again.', 'error');
            } finally {
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // Function to poll for new messages
        async function pollMessages() {
            try {
                const response = await fetch(`get_messages.php?last_id=${lastMessageId}&chat_id=web_user_123`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                if (data.ok && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if (msg.id > lastMessageId) {
                            lastMessageId = msg.id;
                            appendMessage(msg.text, msg.is_bot ? 'bot' : 'user');
                        }
                    });
                }
            } catch (error) {
                console.error('Polling error:', error.message, error);
                appendMessage('Connection issue. Retrying...', 'error');
            }
            setTimeout(pollMessages, 2000);
        }

        // Handle Enter key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) sendMessage();
        });

        // Start polling
        pollMessages();
    </script>
</body>
</html>
